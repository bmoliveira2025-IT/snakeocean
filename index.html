<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>cobra.io - Edição Premium (Otimizada)</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0b0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-512.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --neon-blue: #00ddff;
            --neon-pink: #ff00aa;
            --neon-green: #56ab2f;
            --neon-green-dark: #3a7d20;
            --bg-dark: #0b0e14;
            --glass-bg: rgba(11, 14, 20, 0.75);
            font-family: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: white;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            transform: translateZ(0);
            will-change: transform;
        }

        /* --- HUD LEADERBOARD --- */
        #leaderboard {
            position: absolute;
            top: env(safe-area-inset-top, 15px);
            right: env(safe-area-inset-right, 15px);
            width: clamp(140px, 25vw, 220px);
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            pointer-events: none;
            z-index: 10;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #leaderboard h3 {
            margin: 0 0 10px 0;
            font-size: clamp(12px, 3vw, 16px);
            text-align: right;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .leader-item {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: clamp(11px, 2vw, 13px);
            line-height: 1.5;
            font-weight: 600;
        }

        .rank-num {
            width: 24px;
            text-align: left;
            opacity: 0.6;
            font-size: 0.9em;
        }

        .leader-name {
            flex-grow: 1;
            text-align: left;
            padding-left: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .leader-score {
            width: 55px;
            text-align: right;
            opacity: 0.9;
            font-variant-numeric: tabular-nums;
        }

        .my-rank {
            color: var(--neon-blue);
            background: rgba(0, 221, 255, 0.1);
            border-radius: 4px;
            padding: 2px 4px;
            margin-top: 6px;
            font-weight: 800;
        }

        /* --- Menu Inicial --- */
        #start-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(11, 25, 40, 0.85), var(--bg-dark));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: clamp(10px, 3vw, 20px);
            transition: opacity 0.4s ease;
        }

        .main-logo {
            font-size: clamp(50px, 12vw, 90px);
            font-weight: 900;
            text-transform: lowercase;
            background: linear-gradient(to right, #ffffff, var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(86, 171, 47, 0.5));
            margin-bottom: 0.2rem;
            text-align: center;
            line-height: 1;
        }

        .home-record-display {
            font-size: clamp(11px, 3vw, 15px);
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: clamp(15px, 3vw, 25px);
            font-weight: 700;
            text-align: center;
        }

        .home-record-display span {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(86, 171, 47, 0.5);
        }

        #game-over-msg {
            color: #ff4444;
            font-weight: 900;
            text-align: center;
            margin-bottom: 15px;
            font-size: clamp(18px, 4vw, 22px);
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
            animation: pulse 2s infinite;
        }

        .final-score-text {
            display: block;
            font-size: clamp(13px, 3vw, 15px);
            color: white;
            text-shadow: none;
            margin-top: 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .final-score-text span {
            color: var(--neon-green);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.9;
            }
        }

        .menu-card {
            background: var(--glass-bg);
            padding: clamp(20px, 4vw, 35px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02);
            gap: 15px;
        }

        #player-name {
            width: 100%;
            padding: clamp(14px, 3vw, 18px);
            font-size: clamp(15px, 4vw, 18px);
            font-family: inherit;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(86, 171, 47, 0.4);
            border-radius: 1rem;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #player-name:focus {
            outline: none;
            border-color: var(--neon-green);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(86, 171, 47, 0.3);
        }

        .skin-selector {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .carousel-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
        }

        .carousel-btn {
            background: linear-gradient(to bottom, var(--neon-green), var(--neon-green-dark));
            border: none;
            width: 45px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
        }

        .carousel-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.5));
        }

        .carousel-btn:active {
            transform: scale(0.9);
        }

        #skin-name {
            font-weight: 800;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 11px;
        }

        #preview-canvas {
            width: 100%;
            max-width: 220px;
            height: auto;
            aspect-ratio: 2 / 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            width: 100%;
        }

        #start-btn {
            padding: clamp(14px, 3vw, 18px);
            font-size: clamp(16px, 4vw, 20px);
            font-family: inherit;
            font-weight: 900;
            background: linear-gradient(to bottom, var(--neon-green), var(--neon-green-dark));
            border: none;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #255215, 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #start-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #255215, 0 2px 5px rgba(0, 0, 0, 0.4);
        }

        #settings-open-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            width: clamp(50px, 12vw, 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        #settings-open-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
        }

        #settings-open-btn svg {
            width: 26px;
            height: 26px;
            stroke: rgba(255, 255, 255, 0.7);
            stroke-width: 2;
            fill: none;
        }

        /* --- CONFIGURAÇÕES (MODAL) --- */
        #settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .settings-content {
            background: var(--bg-dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .settings-header h2 {
            margin: 0;
            font-size: 20px;
            color: var(--neon-green);
            text-transform: uppercase;
        }

        .settings-close {
            background: none;
            border: none;
            color: white;
            opacity: 0.6;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.6;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .settings-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            transition: all 0.2s;
        }

        .opt-btn.active {
            background: var(--neon-green);
            border-color: var(--neon-green);
            color: white;
            box-shadow: 0 0 15px rgba(86, 171, 47, 0.4);
        }

        /* --- MOBILE CONTROLS --- */
        #mobile-controls {
            display: none;
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }

        #joystick-base {
            position: absolute;
            width: clamp(100px, 18vw, 140px);
            height: clamp(100px, 18vw, 140px);
            left: clamp(20px, 5vw, 40px);
            bottom: clamp(20px, 5vw, 40px);
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }

        #joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 45%;
            height: 45%;
            background: var(--neon-green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-green), inset 0 0 10px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        #boost-btn {
            position: absolute;
            width: clamp(70px, 14vw, 90px);
            height: clamp(70px, 14vw, 90px);
            right: clamp(20px, 5vw, 40px);
            bottom: clamp(20px, 5vw, 40px);
            background: rgba(255, 0, 170, 0.2);
            border: 3px solid var(--neon-pink);
            border-radius: 50%;
            color: white;
            font-size: clamp(12px, 3vw, 16px);
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(255, 0, 170, 0.4);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        #boost-btn:active {
            transform: scale(0.95);
            background: rgba(255, 0, 170, 0.4);
        }

        /* Responsive Tweaks */
        @media screen and (orientation: portrait) {
            #start-screen {
                justify-content: flex-start;
                padding-top: 15vh;
            }

            .menu-card {
                max-width: 90vw;
            }

            #leaderboard {
                top: auto;
                bottom: 15px;
                right: 15px;
                width: 160px;
            }

            #joystick-base {
                bottom: 80px;
                left: 20px;
            }

            #boost-btn {
                bottom: 80px;
                right: 20px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            #start-screen {
                flex-direction: row;
                gap: 40px;
                padding: 10px 40px;
                justify-content: center;
            }

            .main-logo {
                font-size: 45px;
                margin-bottom: 5px;
            }

            .home-record-display {
                font-size: 11px;
                margin-bottom: 10px;
            }

            #game-over-msg {
                font-size: 16px;
                margin-bottom: 10px;
            }

            .menu-card {
                padding: 15px;
                gap: 10px;
                max-width: 320px;
            }

            #player-name {
                padding: 10px;
                font-size: 14px;
            }

            .skin-selector {
                padding: 8px;
                gap: 4px;
            }

            #preview-canvas {
                max-width: 160px;
            }

            #start-btn {
                padding: 12px;
                font-size: 15px;
                box-shadow: 0 4px 0 #255215;
            }

            #start-btn:active {
                transform: translateY(4px);
                box-shadow: 0 0 0 #255215;
            }

            #settings-open-btn {
                width: 45px;
            }
        }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>
    <div id="start-screen">
        <div>
            <div class="main-logo">cobra.io</div>
            <div class="home-record-display">RECORDE: <span id="high-score-home">0</span></div>
            <div id="game-over-msg" style="display: none;">
                VOCÊ MORREU
                <span class="final-score-text">PONTUAÇÃO FINAL: <span id="final-score-val">0</span></span>
            </div>
        </div>

        <div class="menu-card">
            <input type="text" id="player-name" placeholder="TEU NICKNAME" maxlength="15">

            <div class="skin-selector">
                <div class="carousel-controls">
                    <button class="carousel-btn" id="prev-skin">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" />
                        </svg>
                    </button>
                    <span id="skin-name">Clássica (USA)</span>
                    <button class="carousel-btn" id="next-skin">
                        <svg viewBox="0 0 24 24">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" />
                        </svg>
                    </button>
                </div>
                <canvas id="preview-canvas" width="200" height="100"></canvas>
            </div>

            <div class="action-grid">
                <button id="start-btn">JOGAR</button>
                <button id="settings-open-btn">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <div class="settings-header">
                <h2>Configurações</h2><button class="settings-close" id="settings-close-btn">&times;</button>
            </div>
            <div class="settings-group">
                <label>Qualidade Gráfica (FPS)</label>
                <div class="settings-options">
                    <button class="opt-btn" id="q-high" onclick="setOpt('quality', 'high')">Alta</button>
                    <button class="opt-btn" id="q-low" onclick="setOpt('quality', 'low')">Baixa</button>
                </div>
            </div>
            <div class="settings-group" id="controls-group" style="display:none;">
                <label>Tipo de Controlo (Mobile)</label>
                <div class="settings-options">
                    <button class="opt-btn" id="c-joystick" onclick="setOpt('control', 'joystick')">Joystick</button>
                    <button class="opt-btn" id="c-touch" onclick="setOpt('control', 'touch')">Seguir Dedo</button>
                </div>
            </div>
            <div class="settings-group" id="pwa-install-group" style="display:none;">
                <label>Aplicativo</label>
                <div class="settings-options"><button class="opt-btn" id="pwa-install-btn"
                        style="grid-column: span 2; background: var(--neon-blue); color: #000; border: none;">INSTALAR
                        APP (APK)</button></div>
            </div>
        </div>
    </div>

    <div id="leaderboard">
        <h3>LÍDERES</h3>
        <div id="leader-list"></div>
    </div>
    <div id="mobile-controls">
        <div id="joystick-base" style="display:none;">
            <div id="joystick-stick"></div>
        </div>
        <div id="boost-btn">BOOST</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // =============================================================
        // --- BLOCO DE CONFIGURAÇÃO DO JOGO (AJUSTE AQUI) ---
        // =============================================================
        const GAME_CONFIG = {
            WORLD_SIZE: 9000,
            TOTAL_FOOD: 1500,

            SNAKE_INITIAL_LENGTH: 30,
            SNAKE_INITIAL_RADIUS: 18,
            SNAKE_MAX_RADIUS: 65,     // Aumentado ligeiramente
            SNAKE_HISTORY_STEP: 1,
            SNAKE_HISTORY_SPACING: 5,
            SNAKE_BASE_SPEED: 4.0,

            SNAKE_HITBOX_SIZE: 0.75,
            SNAKE_TURN_SPEED: 0.035,
            SNAKE_TURN_SPEED_BOOST: 0.015,

            GROWTH_PER_FOOD: 1.0,
            SCORE_PER_FOOD: 8,
            DEATH_GROWTH: 0.50,
            DEATH_SCORE: 30,
            WIDTH_GROWTH_FACTOR: 1.5, // Fator agora escalona na Raiz Quadrada
            MAX_HISTORY_LENGTH: 1500, // Limite imposto para salvaguardar CPU/RAM

            MAGNET_STRENGTH: 0.3,
            MAGNET_RADIUS_MULT: 3.0,

            BOOST_SPEED_MULT: 2.0,
            BOOST_SCORE_LOSS: 2,
            BOOST_LENGTH_LOSS: 0.2,
            BOOST_MIN_LENGTH: 10,
            BOOST_FRAMES_PER_DROP: 2,

            CAMERA_BASE_ZOOM: 1.15,
            CAMERA_MIN_ZOOM: 0.25,    // Permite afastar bem mais (Zoom out dinâmico)
            ZOOM_SHRINK_RATE: 0.05,   // Taxa de crescimento do divisor logarítmico
            CAMERA_LOOK_AHEAD: 2.5,

            DEATH_FOOD_RADIUS: 3.5,
            FOOD_GLOW_MULT_NORMAL: 3.5,
            FOOD_GLOW_MULT_DEATH: 2.0
        };

        let CENTER = GAME_CONFIG.WORLD_SIZE / 2;

        function getEntityRadius(length) {
            const lenDiff = Math.max(0, length - GAME_CONFIG.SNAKE_INITIAL_LENGTH);
            return Math.min(GAME_CONFIG.SNAKE_MAX_RADIUS, GAME_CONFIG.SNAKE_INITIAL_RADIUS + Math.sqrt(lenDiff) * GAME_CONFIG.WIDTH_GROWTH_FACTOR);
        }

        // --- SISTEMA DE UI & SETTINGS ---
        let qualityOpt = localStorage.getItem('cobraioQuality') || 'high';
        let controlOpt = localStorage.getItem('cobraioControl') || 'joystick';
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        function applySettingsUI() {
            document.getElementById('q-high').classList.toggle('active', qualityOpt === 'high');
            document.getElementById('q-low').classList.toggle('active', qualityOpt === 'low');
            document.getElementById('c-joystick').classList.toggle('active', controlOpt === 'joystick');
            document.getElementById('c-touch').classList.toggle('active', controlOpt === 'touch');
            const jBase = document.getElementById('joystick-base');
            if (isTouch) {
                document.getElementById('controls-group').style.display = 'block';
                jBase.style.display = controlOpt === 'joystick' ? 'block' : 'none';
            }
        }
        function setOpt(type, val) {
            if (type === 'quality') { qualityOpt = val; localStorage.setItem('cobraioQuality', val); }
            if (type === 'control') { controlOpt = val; localStorage.setItem('cobraioControl', val); }
            applySettingsUI();
        }

        // --- SISTEMAS DE EFEITOS (VFX) ---
        function spawnParticles(x, y, color, amount = 8) {

        // --- SISTEMAS DE SPAWN E COLISÃO ---
        function getSafePosition() {
            const safeDist = GAME_CONFIG.SPAWN_SAFE_RADIUS;
            for (let attempts = 0; attempts < 100; attempts++) {
                const angle = Math.random() * Math.PI * 2, r = Math.random() * (CENTER - 1000);
                const x = CENTER + Math.cos(angle) * r, y = CENTER + Math.sin(angle) * r;
                let isSafe = true;
                const checkEnts = [...bots, ...Object.values(otherPlayers)];
                for (let ent of checkEnts) {
                    if (Math.hypot(x - ent.x, y - ent.y) < safeDist) { isSafe = false; break; }
                }
                if (isSafe) return { x, y };
            }
            const fallbackAngle = Math.random() * Math.PI * 2;
            return { x: CENTER + Math.cos(fallbackAngle) * (CENTER - 500), y: CENTER + Math.sin(fallbackAngle) * (CENTER - 500) };
        }

        function spawnFood(isDeath = false, srcX, srcY) {
            if (isDeath) return { x: srcX, y: srcY, radius: GAME_CONFIG.DEATH_FOOD_RADIUS, color: neonColors[Math.floor(Math.random() * neonColors.length)], phase: Math.random() * Math.PI * 2, floatOffset: 0, isDeathFood: true };
            const angle = Math.random() * Math.PI * 2, r = Math.sqrt(Math.random()) * (CENTER - 20);
            return { x: CENTER + Math.cos(angle) * r, y: CENTER + Math.sin(angle) * r, radius: Math.random() * 1 + 2, color: neonColors[Math.floor(Math.random() * neonColors.length)], phase: Math.random() * Math.PI * 2, floatOffset: Math.random() * Math.PI * 2, isDeathFood: false };
        }

        const checkPerfectCollision = (headX, headY, headR, headAngle, target) => {
            const tipX = headX + Math.cos(headAngle) * (headR * 0.65);
            const tipY = headY + Math.sin(headAngle) * (headR * 0.65);

            const spacing = target.historySpacing || GAME_CONFIG.SNAKE_HISTORY_SPACING;
            const targetLen = Math.max(1, Math.floor(target.length || GAME_CONFIG.SNAKE_INITIAL_LENGTH));
            const maxHistoryIdx = Math.min(targetLen * spacing, target.history.length - 1, GAME_CONFIG.MAX_HISTORY_LENGTH - 1);

            const myHitboxR = headR * 0.35;
            const targetHitboxR = (target.radius || GAME_CONFIG.SNAKE_INITIAL_RADIUS) * GAME_CONFIG.SNAKE_HITBOX_SIZE;
            const thresholdSq = (myHitboxR + targetHitboxR) ** 2;

            for (let i = 0; i <= maxHistoryIdx; i += spacing) {
                const s = target.history[i];
                if (!s || isNaN(s.x) || isNaN(s.y)) continue;
                const distSq = (tipX - s.x) ** 2 + (tipY - s.y) ** 2;
                if (distSq < thresholdSq) return true;
            }
            return false;
        };

        const dropDeathFood = (snake) => {
            const spacing = snake.historySpacing || GAME_CONFIG.SNAKE_HISTORY_SPACING;

            for (let i = 0; i < segments; i++) {
                const pos = i === 0 ? { x: snake.x, y: snake.y } : snake.history[i * spacing];
                if (!pos) continue;
                foods.push(spawnFood(true, pos.x, pos.y));
                const rOffset = Math.random() * (snake.radius * 0.6), angle = Math.random() * Math.PI * 2;
                foods.push(spawnFood(true, pos.x + Math.cos(angle) * rOffset, pos.y + Math.sin(angle) * rOffset));

        };

        // --- INPUT & RESIZE ---
        let mouseX = 0, mouseY = 0, isMouseDown = false;

        window.addEventListener('mouseup', () => { if (!isTouch) isMouseDown = false; });

        const joystickBase = document.getElementById('joystick-base'); const joystickStick = document.getElementById('joystick-stick');
        let joystickTouchId = null, joyX = 0, joyY = 0;

        window.addEventListener('touchstart', (e) => {
            if (!isTouch || e.target.closest('#start-screen') || e.target.closest('#settings-modal') || e.target.closest('#boost-btn')) return;
            if (controlOpt === 'touch') { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; return; }
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && joystickTouchId === null) {
                    joystickTouchId = t.identifier; joyX = t.clientX; joyY = t.clientY;
                    const bRect = joystickBase.getBoundingClientRect();
                    joystickBase.style.left = `${joyX - bRect.width / 2}px`; joystickBase.style.top = `${joyY - bRect.height / 2}px`; joystickBase.style.bottom = 'auto';
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isTouch || e.target.closest('#start-screen') || e.target.closest('#settings-modal')) return;
            if (controlOpt === 'touch') { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; return; }
            if (joystickTouchId === null) return;
            for (let t of e.changedTouches) {
                if (t.identifier === joystickTouchId) {
                    let dx = t.clientX - joyX, dy = t.clientY - joyY;
                    let dist = Math.sqrt(dx * dx + dy * dy), max = joystickBase.offsetWidth / 2;
                    if (dist > max) { dx *= max / dist; dy *= max / dist; }
                    joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    let angle = Math.atan2(dy, dx);
                    mouseX = canvas.width / 2 + Math.cos(angle) * 200; mouseY = canvas.height / 2 + Math.sin(angle) * 200;

        window.addEventListener('touchend', (e) => {

        });
        window.addEventListener('touchcancel', (e) => { joystickTouchId = null; joystickStick.style.transform = `translate(-50%, -50%)`; joystickBase.style.left = ''; joystickBase.style.top = ''; joystickBase.style.bottom = ''; });

        const bBtn = document.getElementById('boost-btn');
        bBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isMouseDown = true; });
        bBtn.addEventListener('touchend', (e) => { e.preventDefault(); isMouseDown = false; });

        let lastLoopTime = performance.now();

        // --- UPDATE LOOP (LÓGICA) ---
        function update() {
            if (gameState !== 'PLAYING' && gameState !== 'DYING') return;

            const nowTime = performance.now();
            let dt = (nowTime - lastLoopTime) / 16.667;
            if (dt > 5) dt = 1;
            lastLoopTime = nowTime;

            for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03; if (p.life <= 0) particles.splice(i, 1); }
            for (let i = floatingTexts.length - 1; i >= 0; i--) { let ft = floatingTexts[i]; ft.y += ft.vy; ft.life -= 0.02; if (ft.life <= 0) floatingTexts.splice(i, 1); }
            for (let i = sparks.length - 1; i >= 0; i--) { let s = sparks[i]; s.x += s.vx; s.y += s.vy; s.life -= 0.05; if (s.life <= 0) sparks.splice(i, 1); }

            const lerpFactor = Math.min(1, 0.2 * dt);

            const updateEntityMovement = (ent) => {
                if (ent.isDead) return;
                if (ent.targetX !== undefined) {
                    const moveSpeed = ent.isBoosting ? GAME_CONFIG.SNAKE_BASE_SPEED * GAME_CONFIG.BOOST_SPEED_MULT : GAME_CONFIG.SNAKE_BASE_SPEED;
                    ent.targetX += Math.cos(ent.targetAngle) * moveSpeed * dt;
                    ent.targetY += Math.sin(ent.targetAngle) * moveSpeed * dt;

                    const distToTarget = Math.hypot(ent.targetX - ent.x, ent.targetY - ent.y);
                    if (distToTarget > 100) {
                        const dx = ent.targetX - ent.x, dy = ent.targetY - ent.y;
                        ent.x = ent.targetX; ent.y = ent.targetY; ent.angle = ent.targetAngle;
                        for (let i = 0; i < ent.history.length; i++) { ent.history[i].x += dx; ent.history[i].y += dy; }
                        ent.lastX = ent.x; ent.lastY = ent.y; ent.distAccum = 0;
                    } else {
                        ent.x += (ent.targetX - ent.x) * lerpFactor; ent.y += (ent.targetY - ent.y) * lerpFactor;
                        let aDiff = ent.targetAngle - ent.angle;
                        while (aDiff < -Math.PI) aDiff += Math.PI * 2; while (aDiff > Math.PI) aDiff -= Math.PI * 2;
                        ent.angle += aDiff * lerpFactor;

                        if (!ent.lastX) { ent.lastX = ent.x; ent.lastY = ent.y; }
                        const distMoved = Math.hypot(ent.x - ent.lastX, ent.y - ent.lastY);

                        ent.distAccum = (ent.distAccum || 0) + distMoved;
                        if (distMoved > 0.001) {
                            const vx = Math.cos(ent.angle), vy = Math.sin(ent.angle);
                            while (ent.distAccum >= GAME_CONFIG.SNAKE_HISTORY_STEP) {
                                ent.distAccum -= GAME_CONFIG.SNAKE_HISTORY_STEP;
                                ent.history.unshift({ x: ent.x - vx * ent.distAccum, y: ent.y - vy * ent.distAccum });
                            }
                            const targetLen = Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor((ent.length || GAME_CONFIG.SNAKE_INITIAL_LENGTH) * GAME_CONFIG.SNAKE_HISTORY_SPACING) + 1);
                            if (ent.history.length > targetLen) ent.history.length = targetLen;
                            ent.lastX = ent.x; ent.lastY = ent.y;
                        }
                    }
                }
                ent.radius = getEntityRadius(ent.length);
            };

            bots.forEach(updateEntityMovement);
            Object.values(otherPlayers).forEach(updateEntityMovement);

            const isBoosting = isMouseDown && player.length > GAME_CONFIG.BOOST_MIN_LENGTH;
            let camTargetX = camera.x, camTargetY = camera.y;

            // --- LÓGICA DO JOGADOR ---
            if (!player.isDead) {
                player.radius = getEntityRadius(player.length);

                // ZOOM INTELIGENTE LOGARÍTMICO (Afastamento profissional baseado em Raiz)
                const zoomFactor = 1 + Math.sqrt(Math.max(0, player.length - GAME_CONFIG.SNAKE_INITIAL_LENGTH)) * GAME_CONFIG.ZOOM_SHRINK_RATE;
                const targetZoom = Math.max(GAME_CONFIG.CAMERA_MIN_ZOOM, GAME_CONFIG.CAMERA_BASE_ZOOM / zoomFactor - (isBoosting ? 0.08 : 0));
                camera.zoom += (targetZoom - camera.zoom) * 0.04 * dt;

                player.length += (player.targetLength - player.length) * 0.1 * dt;

                const tx = (mouseX - canvas.width / 2) / camera.zoom + camera.x, ty = (mouseY - canvas.height / 2) / camera.zoom + camera.y;
                const targetAngle = Math.atan2(ty - player.y, tx - player.x);
                let diff = targetAngle - player.angle;
                while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;

                const growthDampening = Math.max(0.55, 1 - (player.length - 20) * 0.001);
                player.angle += diff * (isBoosting ? GAME_CONFIG.SNAKE_TURN_SPEED_BOOST : GAME_CONFIG.SNAKE_TURN_SPEED) * growthDampening * dt;

                if (isBoosting) {
                    player.speed = GAME_CONFIG.SNAKE_BASE_SPEED * GAME_CONFIG.BOOST_SPEED_MULT;
                    const tail = player.history[Math.floor(player.length * player.historySpacing)];
                    if (tail && Math.random() < 0.4) spawnSpark(tail.x, tail.y, player.angle);
                    player.boostCounter += dt;
                    if (player.boostCounter > GAME_CONFIG.BOOST_FRAMES_PER_DROP) {
                        player.boostCounter = 0;
                        player.targetLength = Math.max(GAME_CONFIG.BOOST_MIN_LENGTH, player.targetLength - GAME_CONFIG.BOOST_LENGTH_LOSS);
                        player.score = Math.max(0, player.score - GAME_CONFIG.BOOST_SCORE_LOSS);
                        if (tail) foods.push(spawnFood(true, tail.x, tail.y));
                    }
                } else {
                    player.speed = GAME_CONFIG.SNAKE_BASE_SPEED; player.boostCounter = 0;
                }

                player.x += Math.cos(player.angle) * player.speed * dt;
                player.y += Math.sin(player.angle) * player.speed * dt;

                let diedThisFrame = false;
                if (Math.sqrt((player.x - CENTER) ** 2 + (player.y - CENTER) ** 2) > CENTER - player.radius * 0.8) {
                    dropDeathFood(player); playerDie(); diedThisFrame = true;
                }

                if (!diedThisFrame) {
                    const enemies = [...bots, ...Object.values(otherPlayers)];
                    for (let e of enemies) {
                        if (!e.isDead && checkPerfectCollision(player.x, player.y, player.radius, player.angle, e)) {
                            dropDeathFood(player); playerDie(); diedThisFrame = true; break;
                        }
                    }
                }

                if (!diedThisFrame) {
                    const pVx = Math.cos(player.angle), pVy = Math.sin(player.angle);
                    player.distAccum = (player.distAccum || 0) + player.speed * dt;
                    while (player.distAccum >= GAME_CONFIG.SNAKE_HISTORY_STEP) {
                        player.distAccum -= GAME_CONFIG.SNAKE_HISTORY_STEP;
                        player.history.unshift({ x: player.x - pVx * player.distAccum, y: player.y - pVy * player.distAccum });
                    }
                    player.history.length = Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor(player.length * player.historySpacing) + 1);

                    let lookDist = player.radius * GAME_CONFIG.CAMERA_LOOK_AHEAD * (isBoosting ? 1.8 : 1.0);
                    camTargetX = player.x + Math.cos(player.angle) * lookDist;
                    camTargetY = player.y + Math.sin(player.angle) * lookDist;
                } else {
                    camTargetX = player.x; camTargetY = player.y;
                }
            } else {
                camTargetX = player.x; camTargetY = player.y;
            }

            camera.x += (camTargetX - camera.x) * 0.06 * dt; camera.y += (camTargetY - camera.y) * 0.06 * dt;

            if (!player.isDead) {
                const magnet = player.radius * GAME_CONFIG.MAGNET_RADIUS_MULT;
                for (let i = foods.length - 1; i >= 0; i--) {
                    const f = foods[i], d = Math.sqrt((player.x - f.x) ** 2 + (player.y - f.y) ** 2);
                    if (d < player.radius + f.radius) {
                        foods.splice(i, 1);
                        spawnParticles(f.x, f.y, f.color, f.isDeathFood ? 15 : 8);
                        let pts = f.isDeathFood ? GAME_CONFIG.DEATH_SCORE : GAME_CONFIG.SCORE_PER_FOOD;
                        spawnFloatingText(f.x, f.y, `+${pts}`, f.color);
                        player.targetLength += f.isDeathFood ? GAME_CONFIG.DEATH_GROWTH : GAME_CONFIG.GROWTH_PER_FOOD;
                        player.score += pts;
                        if (player.score > highScore) {
                            highScore = player.score; highScoreHomeElement.innerText = Math.floor(highScore);
                            localStorage.setItem('cobraioHighScore', highScore);
                        }
                        socket.emit('eatFood', f.id);
                    } else if (d < magnet) { f.x += (player.x - f.x) * GAME_CONFIG.MAGNET_STRENGTH; f.y += (player.y - f.y) * GAME_CONFIG.MAGNET_STRENGTH; }
                }

                const now = Date.now();
                if (now - lastUpdateTime > 50) {
                    lastUpdateTime = now;
                    socket.emit('update', { x: player.x, y: player.y, angle: player.angle, score: player.score, length: player.length, radius: player.radius, isBoosting: isBoosting });
                }
            }

            if (Date.now() % 30 < 2) updateLeaderboard();
        }

        function updateLeaderboard() {
            const list = [...bots, ...Object.values(otherPlayers), player].map(p => ({ name: p.name, score: p.score || 0, isPlayer: p === player, ref: p })).sort((a, b) => b.score - a.score);
            const pIdx = list.findIndex(x => x.isPlayer);
            list.forEach(p => p.ref.isTop1 = false);
            if (list.length > 0) list[0].ref.isTop1 = true;

            leaderList.innerHTML = list.slice(0, 10).map((p, i) => `
                <div class="leader-item" style="color: ${p.isPlayer ? 'var(--neon-green)' : 'rgba(255,255,255,0.5)'}">
                    <span class="rank-num">#${i + 1}</span><span class="leader-name">${p.name}</span><span class="leader-score">${Math.floor(p.score)}</span>
                </div>
            `).join('') + (pIdx >= 10 ? `
                <div style="text-align:center; font-size:10px; opacity:0.3; margin:2px 0;">...</div>
                <div class="leader-item my-rank"><span class="rank-num">#${pIdx + 1}</span><span class="leader-name">${player.name}</span><span class="leader-score">${Math.floor(player.score)}</span></div>
            ` : '');
        }

        function drawSnake(context, entity, activeSkin, isBoosting, customSpacing) {
            if (!activeSkin || !activeSkin.getBodyColor) activeSkin = skins[0];
            if (entity.isDead) return;

            const radius = Math.max(10, entity.radius || 20);
            const spacing = customSpacing || GAME_CONFIG.SNAKE_HISTORY_SPACING || 5;
            const segments = Math.max(1, Math.floor(entity.length || 10));
            const isHigh = qualityOpt === 'high';

            if (!entity.history || entity.history.length < 2) { entity.history = Array.from({ length: 20 }, () => ({ x: entity.x, y: entity.y })); }

            const availableSegments = Math.max(1, Math.min(segments, Math.floor((entity.history.length - 1) / spacing)));

            // LOD (Level Of Detail) DO CORPO: Pula o desenho de círculos se a câmera estiver longe!
            let lodMult = 1;
            if (camera.zoom < 0.6) lodMult = 2;
            if (camera.zoom < 0.35) lodMult = 3;

            context.save(); context.lineCap = 'round'; context.lineJoin = 'round';
            if (isHigh && isBoosting) { context.shadowBlur = 10; context.shadowColor = activeSkin.getBodyColor(false, 0, segments)[0]; }

            context.lineWidth = (radius * 2) + 6; context.strokeStyle = '#000000';
            context.beginPath(); context.moveTo(entity.x, entity.y);
            for (let i = 1; i < availableSegments; i++) {
                const pos = entity.history[i * spacing];
                if (pos) context.lineTo(pos.x, pos.y);
            }
            context.stroke(); context.restore();

            for (let i = availableSegments - 1; i >= 0; i -= lodMult) { // O salto mágico do LOD
                const pos = i === 0 ? { x: entity.x, y: entity.y } : entity.history[i * spacing];
                if (!pos || isNaN(pos.x)) continue;
                let isDark = Math.floor(i / 4) % 2 === 0;
                const baseColors = activeSkin.getBodyColor(isDark, i, availableSegments);
                let c = activeSkin.getTailColor && activeSkin.getTailColor(availableSegments - i) ? activeSkin.getTailColor(availableSegments - i) : { c1: baseColors[0], c2: baseColors[1] };
                context.fillStyle = c.c1 || '#fff';
                context.beginPath(); context.arc(pos.x, pos.y, radius, 0, Math.PI * 2); context.fill();
            }

            if (isHigh) {
                context.save(); context.lineCap = 'round'; context.lineJoin = 'round';
                context.lineWidth = radius * 0.8; context.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                context.beginPath(); let first = true;
                for (let i = segments - 1; i > 0; i -= lodMult) {
                    const pos = entity.history[i * spacing];
                    if (!pos) continue;
                    if (first) { context.moveTo(pos.x, pos.y); first = false; } else context.lineTo(pos.x, pos.y);
                }
                if (!first) context.lineTo(entity.x, entity.y);
                context.stroke(); context.restore();
            }

            // Olhos
            let eyeAngles = activeSkin.isCyclops ? [entity.angle] : [entity.angle - 0.7, entity.angle + 0.7];
            let eyeRadiusMult = activeSkin.isCyclops ? 0.55 : 0.42;

            eyeAngles.forEach(a => {
                const distOffset = activeSkin.isCyclops ? 0.5 : 0.6;
                const ex = entity.x + Math.cos(a) * radius * distOffset, ey = entity.y + Math.sin(a) * radius * distOffset;
                const eR = radius * eyeRadiusMult;
                context.fillStyle = '#fff'; context.beginPath(); context.arc(ex, ey, eR, 0, Math.PI * 2); context.fill();

                const pR = eR * 0.55, px = ex + Math.cos(entity.angle) * pR * 0.4, py = ey + Math.sin(entity.angle) * pR * 0.4;
                context.fillStyle = activeSkin.eyeColor || '#000'; context.beginPath(); context.arc(px, py, pR, 0, Math.PI * 2); context.fill();
                if (isHigh) {
                    context.fillStyle = '#fff'; context.beginPath(); context.arc(px - pR * 0.3, py - pR * 0.3, pR * 0.3, 0, Math.PI * 2); context.fill();
                }
            });

            if (entity.isTop1) {
                context.save(); context.translate(entity.x, entity.y); context.rotate(entity.angle);
                context.fillStyle = '#ffdd00'; context.shadowBlur = isHigh ? 10 : 0; context.shadowColor = '#ffaa00';
                context.strokeStyle = '#ffffff'; context.lineWidth = 1.5; context.beginPath();
                let cr = radius;
                context.moveTo(-cr * 0.1, -cr * 0.5); context.lineTo(-cr * 0.8, -cr * 0.6); context.lineTo(-cr * 0.5, -cr * 0.15);
                context.lineTo(-cr * 1.0, 0); context.lineTo(-cr * 0.5, cr * 0.15); context.lineTo(-cr * 0.8, cr * 0.6);
                context.lineTo(-cr * 0.1, cr * 0.5); context.quadraticCurveTo(cr * 0.2, 0, -cr * 0.1, -cr * 0.5);
                context.fill(); context.stroke(); context.restore();
            }
        }

        // --- DRAW LOOP (RENDERIZAÇÃO) ---
        function draw() {
            ctx.fillStyle = '#0b0e14'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            camera.shake *= 0.85; if (camera.shake < 0.5) camera.shake = 0;
            ctx.save();
            let sx = camera.shake > 0 ? (Math.random() - 0.5) * camera.shake : 0, sy = camera.shake > 0 ? (Math.random() - 0.5) * camera.shake : 0;
            ctx.translate(canvas.width / 2 + sx, canvas.height / 2 + sy);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            const isHigh = qualityOpt === 'high';

            // LOD DO FUNDO: Grelha duplica ou triplica consoante o Zoom Out (Evita o colapso da Placa Gráfica)
            let bgLod = 1;
            if (camera.zoom < 0.6) bgLod = 2;
            if (camera.zoom < 0.35) bgLod = 3;

            const r = 45 * bgLod, w = Math.sqrt(3) * r, h = 2 * r, offY = h * 0.75;
            const vW = canvas.width / camera.zoom, vH = canvas.height / camera.zoom;
            ctx.strokeStyle = '#0d1116'; ctx.lineWidth = 4 * bgLod;
            ctx.beginPath();
            for (let row = Math.floor((camera.y - vH / 2) / offY) - 1; row <= Math.floor((camera.y + vH / 2) / offY) + 1; row++) {
                for (let col = Math.floor((camera.x - vW / 2) / w) - 1; col <= Math.floor((camera.x + vW / 2) / w) + 1; col++) {
                    let px = col * w + (row % 2 === 0 ? 0 : w / 2), py = row * offY;
                    for (let i = 0; i < 6; i++) {
                        let a = Math.PI / 180 * (60 * i - 30);
                        let x = px + r * 0.95 * Math.cos(a), y = py + r * 0.95 * Math.sin(a);
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.lineTo(px + r * 0.95 * Math.cos(Math.PI / 180 * (-30)), py + r * 0.95 * Math.sin(Math.PI / 180 * (-30)));
                }
            }
            ctx.stroke();

            // Bordas Mundo
            ctx.beginPath(); ctx.arc(CENTER, CENTER, CENTER, 0, Math.PI * 2);
            let distToCenter = Math.hypot(player.x - CENTER, player.y - CENTER);
            let danger = Math.max(0, (distToCenter - (CENTER - 1000)) / 1000);
            let pulse = (Math.sin(Date.now() / 150) + 1) / 2;
            ctx.strokeStyle = `rgba(255, 50, 50, ${0.2 + (danger * pulse * 0.4)})`;
            ctx.lineWidth = 20 + (danger * pulse * 20); ctx.stroke();

            // Renderização de Comida (A simplifica se estiver muito longe)
            const tTime = Date.now() / 1000;
            const veryZoomedOut = camera.zoom < 0.4;

            foods.forEach(f => {
                if (f.x < camera.x - vW / 2 - 30 || f.x > camera.x + vW / 2 + 30 || f.y < camera.y - vH / 2 - 30 || f.y > camera.y + vH / 2 + 30) return;
                const phase = f.phase || 0;
                const rAnim = f.isDeathFood ? f.radius : f.radius + Math.sin(Date.now() / 150 + phase) * 0.8;
                const floatX = f.isDeathFood ? 0 : Math.sin(tTime * 1.5 + phase) * 4, floatY = f.isDeathFood ? 0 : Math.cos(tTime * 2.0 + phase) * 4;
                const dX = f.x + floatX, dY = f.y + floatY;

                if (isHigh && !veryZoomedOut) {
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.fillStyle = f.color;
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath(); ctx.arc(dX, dY, rAnim * (f.isDeathFood ? 2.5 : 2.0), 0, Math.PI * 2); ctx.fill();
                    ctx.globalAlpha = 1.0;
                    ctx.beginPath(); ctx.arc(dX, dY, rAnim, 0, Math.PI * 2); ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';
                } else {
                    ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(dX, dY, rAnim, 0, Math.PI * 2); ctx.fill();
                }
            });

            if (isHigh && !veryZoomedOut) {
                ctx.globalCompositeOperation = 'lighter';
                sparks.forEach(s => { ctx.fillStyle = `rgba(255,255,255,${s.life})`; ctx.beginPath(); ctx.arc(s.x, s.y, 2 * s.life, 0, Math.PI * 2); ctx.fill(); });
                ctx.globalCompositeOperation = 'source-over';
            }

            const isBoostingAtivo = isMouseDown && player.length > GAME_CONFIG.BOOST_MIN_LENGTH;
            bots.forEach(bot => drawSnake(ctx, bot, skins[bot.skinIndex % skins.length || 0], bot.isBoosting));
            Object.values(otherPlayers).forEach(p => drawSnake(ctx, p, skins[p.skinIndex % skins.length || 0], p.isBoosting));

            if (!player.isDead) {
                drawSnake(ctx, player, skins[currentSkinIndex % skins.length], isBoostingAtivo);
                ctx.font = 'bold 16px Outfit, sans-serif'; ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fillText(player.name, player.x, player.y - player.radius - 15);
            }

            ctx.font = 'bold 16px Outfit, sans-serif'; ctx.textAlign = 'center';
            bots.forEach(bot => {
                if (!bot.isDead && bot.x > camera.x - vW / 2 && bot.x < camera.x + vW / 2 && bot.y > camera.y - vH / 2 && bot.y < camera.y + vH / 2) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillText(bot.name, bot.x, bot.y - bot.radius - 15);
                }
            });

            if (!veryZoomedOut) {
                particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill(); });
                ctx.globalAlpha = 1.0;
                ctx.font = '900 14px Outfit, sans-serif';
                floatingTexts.forEach(ft => { ctx.fillStyle = ft.color; ctx.globalAlpha = Math.max(0, ft.life); ctx.fillText(ft.text, ft.x, ft.y); });
                ctx.globalAlpha = 1.0;
            }

            ctx.restore();

            // Radar Minimap
            if (gameState === 'PLAYING') {
                const mmR = isTouch ? 40 : 50, mmM = 20, mmX = mmM + mmR, mmY = mmM + mmR;
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(mmX, mmY, mmR, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = 'rgba(86,171,47,0.4)'; ctx.lineWidth = 2; ctx.stroke();

                bots.forEach(b => {
                    if (b.isDead) return;
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath(); ctx.arc(mmX + (b.x - CENTER) / CENTER * (mmR - 3), mmY + (b.y - CENTER) / CENTER * (mmR - 3), 2, 0, Math.PI * 2); ctx.fill();
                });
                Object.values(otherPlayers).forEach(p => {
                    if (p.isDead) return;
                    ctx.fillStyle = '#ff00aa';
                    ctx.beginPath(); ctx.arc(mmX + (p.x - CENTER) / CENTER * (mmR - 3), mmY + (p.y - CENTER) / CENTER * (mmR - 3), 2, 0, Math.PI * 2); ctx.fill();
                });

                if (!player.isDead) {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(mmX + (player.x - CENTER) / CENTER * (mmR - 3), mmY + (player.y - CENTER) / CENTER * (mmR - 3), 3, 0, Math.PI * 2); ctx.fill();
                }
            }
        }

        function gameOver() {
            gameState = 'GAME_OVER'; camera.shake = 0;
            document.getElementById('final-score-val').innerText = Math.floor(player.score);
            document.getElementById('game-over-msg').style.display = 'block';
            startScreen.style.opacity = '1'; startScreen.style.display = 'flex';
            leaderboardContainer.style.display = 'none';
            document.getElementById('mobile-controls').style.display = 'none';
            highScoreHomeElement.innerText = Math.floor(highScore);
            mouseX = canvas.width / 2; mouseY = canvas.height / 2;
        }

        function playerDie() {
            if (player.isDead || gameState === 'GAME_OVER') return;
            socket.emit('playerDied');
            player.isDead = true; gameState = 'DYING'; camera.shake = 15;
            setTimeout(() => { gameOver(); }, 2500);
        }

        // Preview Snake no Menu
        const pCanvas_ = document.getElementById('preview-canvas');
        const pCtx_ = pCanvas_.getContext('2d');
        const pSnake = { x: -60, y: 50, angle: 0, radius: 15, length: 25, history: [], historySpacing: GAME_CONFIG.SNAKE_HISTORY_SPACING, isTop1: false };
        pSnake.history = Array.from({ length: 150 }, () => ({ x: -60, y: 50 }));

        function drawPreview() {
            if (gameState === 'PLAYING' || gameState === 'DYING') return;
            pCtx_.clearRect(0, 0, pCanvas_.width, pCanvas_.height);
            const w = pCanvas_.width, h = pCanvas_.height, speed = 1.5;
            pSnake.x += speed; pSnake.y = (h / 2) + Math.sin(Date.now() * 0.004) * 12;
            pSnake.angle = Math.atan2(pSnake.y - pSnake.history[0].y, pSnake.x - pSnake.history[0].x);

            if (pSnake.x > w + 60) {
                pSnake.x = -60; pSnake.history = Array.from({ length: 150 }, () => ({ x: -60, y: pSnake.y }));
            }
            pSnake.history.unshift({ x: pSnake.x, y: pSnake.y });
            pSnake.history.length = Math.floor(pSnake.length * pSnake.historySpacing) + 1;
            drawSnake(pCtx_, pSnake, skins[currentSkinIndex], false);
        }

        document.getElementById('prev-skin').onclick = () => { currentSkinIndex = (currentSkinIndex - 1 + skins.length) % skins.length; document.getElementById('skin-name').innerText = skins[currentSkinIndex].name; };
        document.getElementById('next-skin').onclick = () => { currentSkinIndex = (currentSkinIndex + 1) % skins.length; document.getElementById('skin-name').innerText = skins[currentSkinIndex].name; };
        document.getElementById('skin-name').innerText = skins[currentSkinIndex].name;

        document.getElementById('start-btn').onclick = () => {
            if (isTouch) {
                const docEl = document.documentElement;
                if (docEl.requestFullscreen) docEl.requestFullscreen().catch(() => { });
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen().catch(() => { });
            }
            player.name = document.getElementById('player-name').value.trim() || 'Player';
            localStorage.setItem('cobraioNick', player.name);

            const pos = getSafePosition();
            player.x = pos.x; player.y = pos.y;
            player.length = GAME_CONFIG.SNAKE_INITIAL_LENGTH; player.score = 0; player.distAccum = 0;
            player.isDead = false;
            player.history = Array.from({ length: GAME_CONFIG.SNAKE_INITIAL_LENGTH * GAME_CONFIG.SNAKE_HISTORY_SPACING + 1 }, () => ({ x: player.x, y: player.y }));

            camera.x = player.x; camera.y = player.y; camera.shake = 0;
            foods.length = 0; particles.length = 0; floatingTexts.length = 0; sparks.length = 0;
            mouseX = canvas.width / 2; mouseY = canvas.height / 2; isMouseDown = false;

            gameState = 'PLAYING';
            socket.emit('join', { name: player.name, skinIndex: currentSkinIndex });

            startScreen.style.display = 'none'; leaderboardContainer.style.display = 'block';
            if (isTouch) document.getElementById('mobile-controls').style.display = 'block';
            lastLoopTime = performance.now();
            updateLeaderboard();
        };

        const nickGuardado = localStorage.getItem('cobraioNick');
        if (nickGuardado) document.getElementById('player-name').value = nickGuardado;

        function loop() { update(); draw(); drawPreview(); requestAnimationFrame(loop); }

        let deferredPrompt; const installBtnGroup = document.getElementById('pwa-install-group'); const installBtn = document.getElementById('pwa-install-btn');
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(() => { }); }); }
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtnGroup.style.display = 'block'; });
        installBtn.addEventListener('click', async () => { if (!deferredPrompt) return; deferredPrompt.prompt(); deferredPrompt = null; installBtnGroup.style.display = 'none'; });

        requestAnimationFrame(loop);
    </script>
</body>
