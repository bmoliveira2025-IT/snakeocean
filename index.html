<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>cobra.io - Edição Premium (AAA)</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0b0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-512.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --neon-blue: #00ddff;
            --neon-pink: #ff00aa;
            --neon-green: #56ab2f;
            --neon-green-dark: #3a7d20;
            --bg-dark: #0b0e14;
            --glass-bg: rgba(15, 20, 28, 0.65);
            font-family: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: white;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            transform: translateZ(0);
            will-change: transform;
        }

        /* --- HUD LEADERBOARD --- */
        #leaderboard {
            position: absolute;
            top: env(safe-area-inset-top, 15px);
            right: env(safe-area-inset-right, 15px);
            width: clamp(150px, 25vw, 240px);
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            pointer-events: none;
            z-index: 10;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #leaderboard h3 {
            margin: 0 0 10px 0;
            font-size: clamp(12px, 3vw, 16px);
            text-align: right;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .leader-item {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: clamp(11px, 2vw, 13px);
            line-height: 1.6;
            font-weight: 700;
        }

        .rank-num {
            width: 24px;
            text-align: left;
            opacity: 0.6;
            font-size: 0.9em;
            color: #fff;
        }

        .leader-name {
            flex-grow: 1;
            text-align: left;
            padding-left: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .leader-score {
            width: 55px;
            text-align: right;
            opacity: 0.9;
            font-variant-numeric: tabular-nums;
            color: #fff;
        }

        .my-rank {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 4px;
            margin-top: 8px;
            font-weight: 900;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* --- Menu Inicial Premium --- */
        #start-screen {
            position: absolute;
            inset: 0;
            background: linear-gradient(-45deg, #0b0e14, #141c2b, #0b0e14, #0d1e18);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: clamp(10px, 3vw, 20px);
            transition: opacity 0.4s ease;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .main-logo {
            font-size: clamp(50px, 12vw, 90px);
            font-weight: 900;
            text-transform: lowercase;
            background: linear-gradient(to right, #ffffff, var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(86, 171, 47, 0.6));
            margin-bottom: 0.2rem;
            text-align: center;
            line-height: 1;
        }

        .home-record-display {
            font-size: clamp(11px, 3vw, 15px);
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: clamp(15px, 3vw, 25px);
            font-weight: 700;
            text-align: center;
        }

        .home-record-display span {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(86, 171, 47, 0.5);
        }

        #game-over-msg {
            color: #ff4444;
            font-weight: 900;
            text-align: center;
            margin-bottom: 15px;
            font-size: clamp(18px, 4vw, 22px);
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
            animation: pulse 2s infinite;
        }

        .final-score-text {
            display: block;
            font-size: clamp(13px, 3vw, 15px);
            color: white;
            text-shadow: none;
            margin-top: 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .final-score-text span {
            color: var(--neon-green);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.9;
            }
        }

        .menu-card {
            background: var(--glass-bg);
            padding: clamp(20px, 4vw, 35px);
            border-radius: 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            gap: 15px;
        }

        #player-name {
            width: 100%;
            padding: clamp(14px, 3vw, 18px);
            font-size: clamp(15px, 4vw, 18px);
            font-family: inherit;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(86, 171, 47, 0.4);
            border-radius: 1rem;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #player-name:focus {
            outline: none;
            border-color: var(--neon-green);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 20px rgba(86, 171, 47, 0.3);
        }

        .skin-selector {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.4);
        }

        .carousel-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
        }

        .carousel-btn {
            background: linear-gradient(to bottom, var(--neon-green), var(--neon-green-dark));
            border: none;
            width: 45px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, filter 0.2s;
        }

        .carousel-btn:hover {
            filter: brightness(1.2);
        }

        .carousel-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.5));
        }

        .carousel-btn:active {
            transform: scale(0.9);
        }

        #skin-name {
            font-weight: 800;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 12px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        #preview-canvas {
            width: 100%;
            max-width: 240px;
            height: auto;
            aspect-ratio: 2 / 1;
            background: transparent;
            border-radius: 12px;
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.5));
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            width: 100%;
        }

        #start-btn {
            padding: clamp(14px, 3vw, 18px);
            font-size: clamp(16px, 4vw, 20px);
            font-family: inherit;
            font-weight: 900;
            background: linear-gradient(to bottom, var(--neon-green), var(--neon-green-dark));
            border: none;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #255215, 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #start-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #255215, 0 2px 5px rgba(0, 0, 0, 0.4);
        }

        #settings-open-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            width: clamp(50px, 12vw, 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        #settings-open-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
        }

        #settings-open-btn svg {
            width: 26px;
            height: 26px;
            fill: rgba(255, 255, 255, 0.8);
            transition: transform 0.4s ease;
        }

        #settings-open-btn:hover svg {
            transform: rotate(90deg);
            fill: #fff;
        }

        .desktop-tip {
            margin-top: 25px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            max-width: 380px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        .desktop-tip span {
            color: var(--neon-green);
            font-weight: 900;
        }

        #offline-badge {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 85, 0.2);
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
            z-index: 100;
        }

        /* --- CONFIGURAÇÕES (MODAL) --- */
        #settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .settings-content {
            background: var(--bg-dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .settings-header h2 {
            margin: 0;
            font-size: 20px;
            color: var(--neon-green);
            text-transform: uppercase;
        }

        .settings-close {
            background: none;
            border: none;
            color: white;
            opacity: 0.6;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.6;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .settings-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            transition: all 0.2s;
        }

        .opt-btn.active {
            background: var(--neon-green);
            border-color: var(--neon-green);
            color: white;
            box-shadow: 0 0 15px rgba(86, 171, 47, 0.4);
        }

        /* --- MOBILE CONTROLS --- */
        #mobile-controls {
            display: none;
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }

        #joystick-base {
            position: absolute;
            width: clamp(100px, 18vw, 140px);
            height: clamp(100px, 18vw, 140px);
            left: clamp(20px, 5vw, 40px);
            bottom: clamp(20px, 5vw, 40px);
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }

        #joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 45%;
            height: 45%;
            background: var(--neon-green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-green), inset 0 0 10px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        #boost-btn {
            position: absolute;
            width: clamp(70px, 14vw, 90px);
            height: clamp(70px, 14vw, 90px);
            right: clamp(20px, 5vw, 40px);
            bottom: clamp(20px, 5vw, 40px);
            background: rgba(255, 0, 170, 0.2);
            border: 3px solid var(--neon-pink);
            border-radius: 50%;
            color: white;
            font-size: clamp(12px, 3vw, 16px);
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(255, 0, 170, 0.4);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        #boost-btn:active {
            transform: scale(0.95);
            background: rgba(255, 0, 170, 0.4);
        }

        /* Responsive Tweaks */
        @media screen and (orientation: portrait) {
            #start-screen {
                justify-content: flex-start;
                padding-top: 15vh;
            }

            .menu-card {
                max-width: 90vw;
            }

            #leaderboard {
                top: auto;
                bottom: 15px;
                right: 15px;
                width: 160px;
            }

            #joystick-base {
                bottom: 80px;
                left: 20px;
            }

            #boost-btn {
                bottom: 80px;
                right: 20px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            #start-screen {
                flex-direction: row;
                gap: 40px;
                padding: 10px 40px;
                justify-content: center;
            }

            .main-logo {
                font-size: 45px;
                margin-bottom: 5px;
            }

            .home-record-display {
                font-size: 11px;
                margin-bottom: 10px;
            }

            #game-over-msg {
                font-size: 16px;
                margin-bottom: 10px;
            }

            .menu-card {
                padding: 15px;
                gap: 10px;
                max-width: 320px;
            }

            #player-name {
                padding: 10px;
                font-size: 14px;
            }

            .skin-selector {
                padding: 8px;
                gap: 4px;
            }

            #preview-canvas {
                max-width: 160px;
            }

            #start-btn {
                padding: 12px;
                font-size: 15px;
                box-shadow: 0 4px 0 #255215;
            }

            #start-btn:active {
                transform: translateY(4px);
                box-shadow: 0 0 0 #255215;
            }

            #settings-open-btn {
                width: 45px;
            }

            .desktop-tip {
                display: none;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .desktop-tip {
                display: none;
            }
        }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>
    <div id="offline-badge">MODO OFFLINE (IA)</div>

    <div id="start-screen">
        <div>
            <div class="main-logo">cobra.io</div>
            <div class="home-record-display">RECORDE: <span id="high-score-home">0</span></div>
            <div id="game-over-msg" style="display: none;">
                VOCÊ MORREU
                <span class="final-score-text">PONTUAÇÃO FINAL: <span id="final-score-val">0</span></span>
            </div>
        </div>

        <div class="menu-card">
            <input type="text" id="player-name" placeholder="TEU NICKNAME" maxlength="15">

            <div class="skin-selector">
                <div class="carousel-controls">
                    <button class="carousel-btn" id="prev-skin">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" />
                        </svg>
                    </button>
                    <span id="skin-name">Clássica (USA)</span>
                    <button class="carousel-btn" id="next-skin">
                        <svg viewBox="0 0 24 24">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" />
                        </svg>
                    </button>
                </div>
                <canvas id="preview-canvas" width="240" height="120"></canvas>
            </div>

            <div class="action-grid">
                <button id="start-btn">JOGAR</button>
                <button id="settings-open-btn">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="desktop-tip">
            💡 <b>Dica PRO:</b> Pressione <span>F11</span> para Tela Cheia. Use o <span>Scroll</span> do rato para
            controlar o Zoom. Pressione <span>TAB</span> para ocultar a interface. Pressione <span>R</span> ou
            <span>~</span> para redefinir a câmera.
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <div class="settings-header">
                <h2>Configurações</h2><button class="settings-close" id="settings-close-btn">&times;</button>
            </div>
            <div class="settings-group">
                <label>Qualidade Gráfica (FPS)</label>
                <div class="settings-options">
                    <button class="opt-btn" id="q-high" onclick="setOpt('quality', 'high')">Alta</button>
                    <button class="opt-btn" id="q-low" onclick="setOpt('quality', 'low')">Baixa</button>
                </div>
            </div>

            <div class="settings-group">
                <label>Visão Antecipada (Look Ahead)</label>
                <div class="settings-options">
                    <button class="opt-btn" id="l-on" onclick="setOpt('lookAhead', 'on')">Ligado</button>
                    <button class="opt-btn" id="l-off" onclick="setOpt('lookAhead', 'off')">Desligado</button>
                </div>
            </div>

            <div class="settings-group" id="controls-group" style="display:none;">
                <label>Tipo de Controlo (Mobile)</label>
                <div class="settings-options">
                    <button class="opt-btn" id="c-joystick" onclick="setOpt('control', 'joystick')">Joystick</button>
                    <button class="opt-btn" id="c-touch" onclick="setOpt('control', 'touch')">Seguir Dedo</button>
                </div>
            </div>
            <div class="settings-group" id="pwa-install-group" style="display:none;">
                <label>Aplicativo</label>
                <div class="settings-options"><button class="opt-btn" id="pwa-install-btn"
                        style="grid-column: span 2; background: var(--neon-blue); color: #000; border: none;">INSTALAR
                        APP (APK)</button></div>
            </div>
        </div>
    </div>

    <div id="leaderboard">
        <h3>LÍDERES</h3>
        <div id="leader-list"></div>
    </div>
    <div id="mobile-controls">
        <div id="joystick-base" style="display:none;">
            <div id="joystick-stick"></div>
        </div>
        <div id="boost-btn">BOOST</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const getDeviceType = () => {
            const w = window.innerWidth;
            if (!isTouch && w > 1024) return 'PC';
            if (w >= 768 && w <= 1024) return 'TABLET';
            return 'MOBILE';
        };
        const currentDevice = getDeviceType();

        // =============================================================
        // --- BLOCO DE CONFIGURAÇÃO DA IA E COMPORTAMENTO (BOTS) ---
        // =============================================================
        const BOT_AI_CONFIG = {
            TYPES: ['NATIVE', 'SCRIPT'],
            SCRIPT_CHANCE: 0.20,
            VISION_RAY_NATIVE: 400,
            VISION_RAY_SCRIPT: 800,
            FOOD_SENSE_RADIUS: 900,
            COIL_CHANCE: 0.002,
            PANIC_BOOST_CHANCE: 0.30,
            FARM_BOOST_CHANCE: 0.50
        };

        // =============================================================
        // --- BLOCO DE CONFIGURAÇÃO DO JOGO (MASTER CONFIG) ---
        // =============================================================
        const GAME_CONFIG = {
            WORLD_SIZE: 6000, // Tamanho inicial agora é dinâmico (começa mais pequeno para ação imediata)
            TOTAL_FOOD: 1200, // Dinâmico com o tamanho do mapa

            SNAKE_INITIAL_LENGTH: 30,
            SNAKE_INITIAL_RADIUS_MOBILE: 12,
            SNAKE_INITIAL_RADIUS_TABLET: 15,
            SNAKE_INITIAL_RADIUS_PC: 18,
            get SNAKE_INITIAL_RADIUS() {
                if (currentDevice === 'PC') return this.SNAKE_INITIAL_RADIUS_PC;
                if (currentDevice === 'TABLET') return this.SNAKE_INITIAL_RADIUS_TABLET;
                return this.SNAKE_INITIAL_RADIUS_MOBILE;
            },

            SNAKE_MAX_RADIUS: 38,
            WIDTH_GROWTH_FACTOR: 0.15,
            MAX_HISTORY_LENGTH: 50000,

            SNAKE_HISTORY_STEP: 1,
            SNAKE_HISTORY_SPACING: 5,
            SNAKE_BASE_SPEED: 4.0,
            SNAKE_HITBOX_SIZE: 0.80,
            SNAKE_TURN_SPEED: 0.035,
            SNAKE_TURN_SPEED_BOOST: 0.015,

            // CRESCIMENTO REDUZIDO (Para exigir mais tempo a ficar gigante, já que a comida está mais bem espalhada)
            GROWTH_PER_FOOD: 0.8,
            SCORE_PER_FOOD: 5,
            DEATH_GROWTH: 3.2,
            DEATH_SCORE: 20,

            MAGNET_STRENGTH: 0.3,
            MAGNET_RADIUS_MULT: 3.0,

            BOOST_SPEED_MULT: 2.0,
            BOOST_SCORE_LOSS: 2,
            BOOST_LENGTH_LOSS: 0.32,
            BOOST_MIN_LENGTH: 40,
            BOOST_FRAMES_PER_DROP: 2,

            CAMERA_BASE_ZOOM: 1.15,
            CAMERA_MIN_ZOOM: 0.45,
            ZOOM_SHRINK_RATE: 0.015,
            CAMERA_LOOK_AHEAD: 2.5,

            FOOD_GROWTH_RATE: 0.04,
            FIREFLY_SPAWN_CHANCE: 0.02,
            FIREFLY_SCORE: 75,
            FIREFLY_SPEED: 2.2,
            DEATH_FOOD_RADIUS: 6.0,     // Aumentado o tamanho da comida base para ser mais vistosa
            DEATH_DROP_PERCENTAGE: 0.22,
        };

        let CENTER = GAME_CONFIG.WORLD_SIZE / 2;
        let isOfflineMode = false;

        function getEntityRadius(length) {
            const lenDiff = Math.max(0, length - GAME_CONFIG.SNAKE_INITIAL_LENGTH);
            return Math.min(GAME_CONFIG.SNAKE_MAX_RADIUS, GAME_CONFIG.SNAKE_INITIAL_RADIUS + Math.sqrt(lenDiff) * GAME_CONFIG.WIDTH_GROWTH_FACTOR);
        }

        // --- SISTEMA DE UI, SETTINGS & MODS ---
        let qualityOpt = localStorage.getItem('cobraioQuality') || 'high';
        let controlOpt = localStorage.getItem('cobraioControl') || 'joystick';
        let lookAheadOpt = localStorage.getItem('cobraioLookAhead') || 'on';

        let manualZoomMultiplier = 1.0;
        let hudVisible = true;

        function applySettingsUI() {
            document.getElementById('q-high').classList.toggle('active', qualityOpt === 'high');
            document.getElementById('q-low').classList.toggle('active', qualityOpt === 'low');
            document.getElementById('l-on').classList.toggle('active', lookAheadOpt === 'on');
            document.getElementById('l-off').classList.toggle('active', lookAheadOpt === 'off');

            const jBase = document.getElementById('joystick-base');
            if (isTouch) {
                document.getElementById('controls-group').style.display = 'block';
                document.getElementById('c-joystick').classList.toggle('active', controlOpt === 'joystick');
                document.getElementById('c-touch').classList.toggle('active', controlOpt === 'touch');
                jBase.style.display = controlOpt === 'joystick' ? 'block' : 'none';
            }
        }
        function setOpt(type, val) {
            if (type === 'quality') { qualityOpt = val; localStorage.setItem('cobraioQuality', val); }
            if (type === 'control') { controlOpt = val; localStorage.setItem('cobraioControl', val); }
            if (type === 'lookAhead') { lookAheadOpt = val; localStorage.setItem('cobraioLookAhead', val); }
            applySettingsUI();
        }
        document.getElementById('settings-open-btn').onclick = () => { applySettingsUI(); document.getElementById('settings-modal').style.display = 'flex'; };
        document.getElementById('settings-close-btn').onclick = () => { document.getElementById('settings-modal').style.display = 'none'; };

        // --- CANVAS & STATE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const highScoreHomeElement = document.getElementById('high-score-home');
        const leaderboardContainer = document.getElementById('leaderboard');
        const leaderList = document.getElementById('leader-list');
        const startScreen = document.getElementById('start-screen');

        let gameState = 'START';
        let highScore = parseInt(localStorage.getItem('cobraioHighScore')) || 0;
        highScoreHomeElement.innerText = highScore;

        let camera = { x: CENTER, y: CENTER, zoom: GAME_CONFIG.CAMERA_BASE_ZOOM, shake: 0 };
        const neonColors = ['#ff0055', '#00ffaa', '#00ddff', '#ffdd00', '#ff6600', '#aa00ff', '#e0e0ff', '#ff00aa'];

        const particles = []; const floatingTexts = []; const sparks = []; const foods = []; let bots = []; const otherPlayers = {};

        const player = {
            id: null, x: CENTER, y: CENTER, angle: 0, speed: GAME_CONFIG.SNAKE_BASE_SPEED,
            radius: GAME_CONFIG.SNAKE_INITIAL_RADIUS, length: GAME_CONFIG.SNAKE_INITIAL_LENGTH,
            targetLength: GAME_CONFIG.SNAKE_INITIAL_LENGTH, history: [], historySpacing: GAME_CONFIG.SNAKE_HISTORY_SPACING,
            score: 0, boostCounter: 0, name: '', isTop1: false, distAccum: 0, isDead: false
        };

        // --- SKINS ---
        const skins = [
            { name: 'Clássica (USA)', getBodyColor: (isDark) => isDark ? ['#444444', '#0a0a0a'] : ['#ffffff', '#777777'], getTailColor: (p) => p <= 4 ? { c1: '#4466ff', c2: '#001166', stars: true } : p <= 6 ? { c1: '#ff4444', c2: '#660000' } : p <= 8 ? { c1: '#ffffff', c2: '#888888' } : null },
            { name: 'Tóxica Neon', getBodyColor: (isDark) => isDark ? ['#005500', '#001100'] : ['#00ff00', '#007700'] },
            { name: 'Cyberpunk', getBodyColor: (isDark) => isDark ? ['#ff00aa', '#550033'] : ['#00ddff', '#005577'], getTailColor: (p) => p <= 4 ? { c1: '#ffffff', c2: '#aaaaaa' } : null },
            { name: 'Tigre de Fogo', getBodyColor: (isDark) => isDark ? ['#111111', '#000000'] : ['#ff8800', '#aa3300'] },
            { name: 'Espectro', getBodyColor: (isDark) => isDark ? ['#aaddff', '#5588aa'] : ['#ffffff', '#bbddff'], getTailColor: (p) => p <= 6 ? { c1: '#ffffff', c2: '#dddddd' } : null },
            { name: 'Arco-íris', getBodyColor: (isDark, i, segs) => { const h = (i / Math.max(segs, 1)) * 360; return isDark ? [`hsl(${h}, 100%, 35%)`, `hsl(${h}, 100%, 15%)`] : [`hsl(${h}, 100%, 60%)`, `hsl(${h}, 100%, 40%)`]; } },
            { name: 'Dourada Premium', getBodyColor: (isDark) => isDark ? ['#cca600', '#665300'] : ['#ffdd00', '#aa9400'], getTailColor: (p) => p <= 3 ? { c1: '#ffffff', c2: '#aaaaaa' } : null },
            { name: 'Zebra', getBodyColor: (isDark) => isDark ? ['#111111', '#000000'] : ['#ffffff', '#aaaaaa'] },
            { name: 'Galáxia', getBodyColor: (isDark) => isDark ? ['#1a0033', '#0d001a'] : ['#aa00ff', '#550088'], getTailColor: (p) => p <= 5 ? { c1: '#00ddff', c2: '#005588' } : null },
            { name: 'Lava', getBodyColor: (isDark) => isDark ? ['#880000', '#440000'] : ['#ff4400', '#aa2200'], getTailColor: (p) => p <= 4 ? { c1: '#ffdd00', c2: '#ff8800' } : null },
            { name: 'Ciclope Mutante', isCyclops: true, eyeColor: '#ffcc00', getBodyColor: (isDark) => isDark ? ['#2b4a1a', '#182b0f'] : ['#56ab2f', '#3a7d20'] },
            { name: 'Fantasma', eyeColor: '#00ffff', getBodyColor: (isDark) => isDark ? ['#e6ffff', '#99ccff'] : ['#ffffff', '#cce6ff'] },
            { name: 'Máquina de Guerra', isCyclops: true, eyeColor: '#ffdd00', getBodyColor: (isDark) => isDark ? ['#333333', '#111111'] : ['#888888', '#555555'], getTailColor: (p) => p <= 3 ? { c1: '#ff4400', c2: '#aa0000' } : null },
            { name: 'Dragão d\'Água', getBodyColor: (isDark) => isDark ? ['#003366', '#001133'] : ['#00ddff', '#0088cc'], getTailColor: (p) => p <= 5 ? { c1: '#ffffff', c2: '#aaddff' } : null },
            { name: 'Demoníaca', eyeColor: '#ffff00', getBodyColor: (isDark) => isDark ? ['#000000', '#000000'] : ['#ff0000', '#aa0000'] }
        ];
        let currentSkinIndex = 0;

        function getSkinColor(skinIndex) {
            const skin = skins[skinIndex % skins.length] || skins[0];
            return skin.getBodyColor(false, 0, 1)[0];
        }

        // --- SISTEMAS DE OFFLINE BOTS & IA ---
        const localBotNames = ['[BOT] Sweeper', 'Slither.mod', 'Viper', 'Apex', 'CobraQueen', 'Titan', 'Zilla', 'Racer', 'Venom', 'AutoPlay.js'];

        function createLocalBot() {
            const pos = getSafePosition();
            const type = Math.random() < BOT_AI_CONFIG.SCRIPT_CHANCE ? 'SCRIPT' : 'NATIVE';
            const isBoss = Math.random() < 0.25;

            const initialScore = isBoss ? 500 + Math.random() * 1500 : 50 + Math.random() * 100;
            const initialLength = GAME_CONFIG.SNAKE_INITIAL_LENGTH + (initialScore * (GAME_CONFIG.GROWTH_PER_FOOD / GAME_CONFIG.SCORE_PER_FOOD));
            const initialRadius = getEntityRadius(initialLength);

            return {
                id: 'bot-' + Math.random().toString(36).substr(2, 9),
                name: localBotNames[Math.floor(Math.random() * localBotNames.length)],
                botType: type,
                x: pos.x, y: pos.y, angle: Math.random() * Math.PI * 2, targetAngle: Math.random() * Math.PI * 2,
                score: initialScore, length: initialLength, radius: initialRadius,
                history: Array.from({ length: Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor(initialLength * GAME_CONFIG.SNAKE_HISTORY_SPACING) + 10) }, () => ({ x: pos.x, y: pos.y })),
                skinIndex: Math.floor(Math.random() * skins.length),
                aiState: 'WANDER', aiTimer: 0, speed: GAME_CONFIG.SNAKE_BASE_SPEED, isDead: false, distAccum: 0
            };
        }

        function processBotAI(bot, dt) {
            if (bot.isDead) return;

            bot.aiTimer = (bot.aiTimer || 0) - dt;
            bot.isBoosting = false;

            let danger = false;
            let dangerAngle = 0;
            const rayDist = bot.botType === 'SCRIPT' ? BOT_AI_CONFIG.VISION_RAY_SCRIPT : BOT_AI_CONFIG.VISION_RAY_NATIVE;
            const headX = bot.x + Math.cos(bot.angle) * rayDist;
            const headY = bot.y + Math.sin(bot.angle) * rayDist;

            if (!player.isDead) {
                let distToPlayer = Math.hypot(headX - player.x, headY - player.y);
                if (distToPlayer < player.radius * 2 + 50) {
                    danger = true;
                    dangerAngle = Math.atan2(player.y - bot.y, player.x - bot.x);
                }
            }

            if (danger) {
                if (bot.botType === 'SCRIPT' && bot.length > player.length * 1.5) {
                    bot.aiState = 'COIL';
                    bot.coilDir = Math.sign(Math.sin(bot.angle - dangerAngle)) || 1;
                    bot.aiTimer = 100;
                } else {
                    bot.targetAngle = dangerAngle + Math.PI + (Math.random() - 0.5);
                    if (Math.random() < BOT_AI_CONFIG.PANIC_BOOST_CHANCE && bot.length > GAME_CONFIG.BOOST_MIN_LENGTH) {
                        bot.isBoosting = true;
                    }
                    bot.aiState = 'FLEE';
                    bot.aiTimer = 15;
                }
                return;
            }

            if (bot.botType === 'SCRIPT' && bot.length > 100 && Math.random() < BOT_AI_CONFIG.COIL_CHANCE && bot.aiState !== 'COIL') {
                bot.aiState = 'COIL';
                bot.aiTimer = 200;
                bot.coilDir = Math.random() < 0.5 ? 1 : -1;
            }

            if (bot.aiState === 'COIL') {
                bot.targetAngle += 0.08 * bot.coilDir * dt;
                if (bot.aiTimer <= 0) bot.aiState = 'WANDER';
                return;
            }

            if (bot.aiTimer <= 0) {
                let bestFood = null;
                let bestScore = -1;

                for (let f of foods) {
                    let dist = Math.hypot(bot.x - f.x, bot.y - f.y);
                    if (dist < BOT_AI_CONFIG.FOOD_SENSE_RADIUS) {
                        let value = f.type === 'DEATH' || f.type === 'FIREFLY' ? 50 : 1;
                        let score = value / Math.max(1, dist);
                        if (score > bestScore) {
                            bestScore = score;
                            bestFood = f;
                        }
                    }
                }

                if (bestFood) {
                    bot.targetAngle = Math.atan2(bestFood.y - bot.y, bestFood.x - bot.x);
                    bot.aiState = 'FARMING';

                    if (bot.botType === 'SCRIPT' && (bestFood.type === 'DEATH' || bestFood.type === 'FIREFLY') && Math.random() < BOT_AI_CONFIG.FARM_BOOST_CHANCE && bot.length > GAME_CONFIG.BOOST_MIN_LENGTH) {
                        bot.isBoosting = true;
                    }
                } else {
                    bot.aiState = 'WANDER';
                    bot.targetAngle += (Math.random() - 0.5) * 1.5;
                }
                bot.aiTimer = 15 + Math.random() * 20;
            }
        }

        // --- MULTIPLAYER SETUP ---
        let socket;
        try {
            socket = io();
            socket.on('connect_error', () => {
                if (!isOfflineMode && gameState === 'START') {
                    console.log("Servidor indisponível. A ativar IA Offline Local.");
                    isOfflineMode = true;
                    document.getElementById('offline-badge').style.display = 'block';
                }
            });
        } catch (e) {
            console.warn("Modo Local/Offline");
            socket = { on: () => { }, emit: () => { } };
            isOfflineMode = true;
            document.getElementById('offline-badge').style.display = 'block';
        }
        let lastUpdateTime = 0;

        setTimeout(() => {
            if (lastUpdateTime === 0 && !isOfflineMode && gameState === 'START') {
                isOfflineMode = true;
                document.getElementById('offline-badge').style.display = 'block';
            }
        }, 1500);

        socket.on('init', (data) => {
            if (data.id) player.id = data.id;
            Object.keys(otherPlayers).forEach(id => delete otherPlayers[id]);

            if (data.players) {
                Object.keys(data.players).forEach(id => {
                    if (id !== player.id) {
                        let p = data.players[id];
                        p.targetX = p.x; p.targetY = p.y; p.targetAngle = p.angle;
                        p.history = Array.from({ length: Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor(p.length * GAME_CONFIG.SNAKE_HISTORY_SPACING) + 1) }, () => ({ x: p.x, y: p.y }));
                        otherPlayers[id] = p;
                    }
                });
            }
            foods.length = 0; if (data.foods) foods.push(...data.foods);
            if (data.config) {
                Object.keys(data.config).forEach(k => {
                    if (k !== 'SNAKE_INITIAL_RADIUS') GAME_CONFIG[k] = data.config[k];
                });
                CENTER = GAME_CONFIG.WORLD_SIZE / 2;
            }
            if (data.bots) {
                bots = data.bots.map(b => {
                    b.targetX = b.x; b.targetY = b.y; b.targetAngle = b.angle;
                    const maxLen = Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor(b.length * GAME_CONFIG.SNAKE_HISTORY_SPACING) + 50);
                    b.history = Array.from({ length: maxLen }, () => ({ x: b.x, y: b.y }));
                    return b;
                });
            }
            updateLeaderboard();
            lastUpdateTime = Date.now();
        });

        socket.on('botsUpdated', (serverBots) => {
            lastUpdateTime = Date.now();
            serverBots.forEach(sb => {
                let b = bots.find(x => x.id === sb.id);
                if (b) {
                    b.targetX = sb.x; b.targetY = sb.y; b.targetAngle = sb.angle;
                    b.score = sb.score; b.length = sb.length; b.radius = sb.radius || b.radius;
                    b.isBoosting = sb.isBoosting; b.isDead = sb.isDead;
                } else {
                    const maxLen = Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor((sb.length || 26) * GAME_CONFIG.SNAKE_HISTORY_SPACING) + 30);
                    bots.push({ ...sb, targetX: sb.x, targetY: sb.y, targetAngle: sb.angle, history: Array.from({ length: maxLen }, () => ({ x: sb.x, y: sb.y })) });
                }
            });
            bots = bots.filter(b => serverBots.find(sb => sb.id === b.id));
        });

        socket.on('botDied', (data) => {
            const dist = Math.hypot(data.x - camera.x, data.y - camera.y);
            if (dist < 1800) camera.shake = Math.max(camera.shake, 10 * (1 - dist / 1800));
        });

        socket.on('youDied', () => { playerDie(); });

        socket.on('playerJoined', (p) => {
            if (p.id !== player.id) {
                p.targetX = p.x; p.targetY = p.y; p.targetAngle = p.angle;
                p.history = Array.from({ length: Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor(p.length * GAME_CONFIG.SNAKE_HISTORY_SPACING) + 1) }, () => ({ x: p.x, y: p.y }));
                otherPlayers[p.id] = p;
            }
        });

        socket.on('playerUpdated', (data) => {
            if (data.id === player.id) return;
            let p = otherPlayers[data.id];
            if (!p) {
                data.targetX = data.x; data.targetY = data.y; data.targetAngle = data.angle;
                data.history = Array.from({ length: Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor((data.length || 30) * GAME_CONFIG.SNAKE_HISTORY_SPACING) + 50) }, () => ({ x: data.x, y: data.y }));
                otherPlayers[data.id] = data; return;
            }
            p.targetX = data.x; p.targetY = data.y; p.targetAngle = data.angle;
            p.score = data.score; p.length = data.length; p.radius = data.radius;
            p.isBoosting = data.isBoosting; p.isDead = data.isDead;
        });

        socket.on('playerLeft', (id) => { delete otherPlayers[id]; });
        socket.on('deathResidue', (newFoods) => { if (Array.isArray(newFoods)) foods.push(...newFoods); });
        socket.on('foodEaten', (data) => {
            const index = foods.findIndex(f => f && f.id === data.foodId);
            if (index !== -1) {
                const f = foods[index];
                if (f) spawnParticles(f.x, f.y, f.color, f.type === 'DEATH' ? 15 : 8);
                foods.splice(index, 1);
            }
            if (data.newFood) foods.push(data.newFood);
        });

        // --- SISTEMAS DE EFEITOS (VFX) ---
        function spawnParticles(x, y, color, amount = 8) {
            if (qualityOpt === 'low') return;
            for (let i = 0; i < amount; i++) {
                const speed = Math.random() * 6 + 2, angle = Math.random() * Math.PI * 2;
                particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color });
            }
        }
        function spawnFloatingText(x, y, text, color) { floatingTexts.push({ x, y, text, color, life: 1, vy: -1.5 }); }
        function spawnSpark(x, y, angle) {
            if (qualityOpt === 'low') return;
            const sparkColors = ['#ffffff', '#00ddff', '#aaddff'];
            sparks.push({ x, y, vx: -Math.cos(angle) * (Math.random() * 3 + 1) + (Math.random() - 0.5) * 2, vy: -Math.sin(angle) * (Math.random() * 3 + 1) + (Math.random() - 0.5) * 2, life: 1, color: sparkColors[Math.floor(Math.random() * sparkColors.length)] });
        }

        function getSafePosition() {
            const safeDist = Math.min(2000, Math.max(800, CENTER * 0.3));

            for (let attempts = 0; attempts < 100; attempts++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * (CENTER - 500);
                const x = CENTER + Math.cos(angle) * r, y = CENTER + Math.sin(angle) * r;
                let isSafe = true;

                const checkEnts = [...bots, ...Object.values(otherPlayers)];
                for (let ent of checkEnts) {
                    if (!ent.isDead && Math.hypot(x - ent.x, y - ent.y) < safeDist) {
                        isSafe = false;
                        break;
                    }
                }
                if (isSafe) return { x, y };
            }
            const fallbackAngle = Math.random() * Math.PI * 2;
            return { x: CENTER + Math.cos(fallbackAngle) * (CENTER - 500), y: CENTER + Math.sin(fallbackAngle) * (CENTER - 500) };
        }

        // --- NOVO ECOSSISTEMA DE ALIMENTOS DISTRIBUÍDOS ---
        function spawnFood(type = 'NORMAL', srcX, srcY, customScore = 0) {
            let x = srcX, y = srcY;

            if (type === 'NORMAL' || type === 'FIREFLY') {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.pow(Math.random(), 0.6) * (CENTER - 50);
                x = CENTER + Math.cos(angle) * r;
                y = CENTER + Math.sin(angle) * r;
            }

            if (type === 'NORMAL' && Math.random() < GAME_CONFIG.FIREFLY_SPAWN_CHANCE) {
                type = 'FIREFLY';
            }

            let radius = 3.5 + Math.random() * 2;
            let scoreValue = GAME_CONFIG.SCORE_PER_FOOD;
            let growthValue = GAME_CONFIG.GROWTH_PER_FOOD;
            let vx = 0, vy = 0;

            if (type === 'FIREFLY') {
                radius = 8 + Math.random() * 3;
                scoreValue = GAME_CONFIG.FIREFLY_SCORE + (Math.random() * 25);
                growthValue = scoreValue * (GAME_CONFIG.GROWTH_PER_FOOD / GAME_CONFIG.SCORE_PER_FOOD);
                const a = Math.random() * Math.PI * 2;
                vx = Math.cos(a) * GAME_CONFIG.FIREFLY_SPEED;
                vy = Math.sin(a) * GAME_CONFIG.FIREFLY_SPEED;
            } else if (type === 'DEATH') {
                radius = GAME_CONFIG.DEATH_FOOD_RADIUS + Math.random() * 3.5;
                scoreValue = customScore;
                growthValue = customScore * (GAME_CONFIG.GROWTH_PER_FOOD / GAME_CONFIG.SCORE_PER_FOOD);
            } else if (type === 'BOOST') {
                radius = 3.0;
                scoreValue = GAME_CONFIG.BOOST_SCORE_LOSS;
                growthValue = GAME_CONFIG.BOOST_LENGTH_LOSS;
            }

            return {
                id: Math.random().toString(36).substr(2, 9),
                type: type,
                x: x, y: y,
                vx: vx, vy: vy,
                radius: radius,
                targetRadius: type === 'NORMAL' ? radius + Math.random() * 4 + 2 : radius,
                color: neonColors[Math.floor(Math.random() * neonColors.length)],
                phase: Math.random() * Math.PI * 2,
                scoreValue: scoreValue,
                growthValue: growthValue
            };
        }

        const checkPerfectCollision = (headX, headY, headR, headAngle, target) => {
            const tipX = headX + Math.cos(headAngle) * (headR * 0.65);
            const tipY = headY + Math.sin(headAngle) * (headR * 0.65);

            const spacing = target.historySpacing || GAME_CONFIG.SNAKE_HISTORY_SPACING;
            const targetLen = Math.max(1, Math.floor(target.length || GAME_CONFIG.SNAKE_INITIAL_LENGTH));
            const maxHistoryIdx = Math.min(targetLen * spacing, (target.history?.length || 1) - 1, GAME_CONFIG.MAX_HISTORY_LENGTH - 1);

            const myHitboxR = headR * 0.35;
            const targetHitboxR = (target.radius || GAME_CONFIG.SNAKE_INITIAL_RADIUS) * GAME_CONFIG.SNAKE_HITBOX_SIZE;
            const thresholdSq = (myHitboxR + targetHitboxR) ** 2;

            for (let i = 0; i <= maxHistoryIdx; i += spacing) {
                const s = target.history[i];
                if (!s || isNaN(s.x) || isNaN(s.y)) continue;
                const distSq = (tipX - s.x) ** 2 + (tipY - s.y) ** 2;
                if (distSq < thresholdSq) return true;
            }
            return false;
        };

        const dropDeathFood = (snake) => {
            if (!snake || !snake.history || snake.score <= 0) return;

            const dropPercentage = GAME_CONFIG.DEATH_DROP_PERCENTAGE + (Math.random() * 0.03);
            const totalDropScore = snake.score * dropPercentage;

            const spacing = snake.historySpacing || GAME_CONFIG.SNAKE_HISTORY_SPACING;
            const segments = Math.min(Math.floor(snake.length), Math.floor((snake.history.length || 0) / spacing));

            const numFoods = Math.max(1, segments * 2);
            const scorePerFood = totalDropScore / numFoods;

            for (let i = 0; i < segments; i++) {
                const pos = i === 0 ? { x: snake.x, y: snake.y } : snake.history[i * spacing];
                if (!pos) continue;

                const r1 = Math.random() * (snake.radius * 0.6), a1 = Math.random() * Math.PI * 2;
                foods.push(spawnFood('DEATH', pos.x + Math.cos(a1) * r1, pos.y + Math.sin(a1) * r1, scorePerFood));

                const r2 = Math.random() * (snake.radius * 0.6), a2 = Math.random() * Math.PI * 2;
                foods.push(spawnFood('DEATH', pos.x + Math.cos(a2) * r2, pos.y + Math.sin(a2) * r2, scorePerFood));
            }
        };

        // --- INPUT & RESIZE ---
        let mouseX = 0, mouseY = 0, isMouseDown = false;
        window.addEventListener('resize', resize);
        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            if (!isTouch && gameState !== 'PLAYING') { mouseX = canvas.width / 2; mouseY = canvas.height / 2; }
        }
        resize();

        if (isTouch) { document.getElementById('mobile-controls').style.display = 'block'; applySettingsUI(); }
        window.addEventListener('mousemove', (e) => { if (!isTouch) { mouseX = e.clientX; mouseY = e.clientY; } });
        window.addEventListener('mousedown', () => { if (!isTouch) isMouseDown = true; });
        window.addEventListener('mouseup', () => { if (!isTouch) isMouseDown = false; });

        window.addEventListener('wheel', (e) => {
            if (gameState === 'PLAYING' && currentDevice === 'PC') {
                if (e.deltaY > 0) manualZoomMultiplier *= 0.9;
                else manualZoomMultiplier *= 1.1;
                manualZoomMultiplier = Math.max(0.4, Math.min(manualZoomMultiplier, 2.5));
            }
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (gameState === 'PLAYING') {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    hudVisible = !hudVisible;
                    document.getElementById('leaderboard').style.display = hudVisible ? 'block' : 'none';
                    document.getElementById('mobile-controls').style.display = (hudVisible && isTouch) ? 'block' : 'none';
                }
                if (e.key === '~' || e.key === '´' || e.key === '`' || e.key.toLowerCase() === 'r') {
                    manualZoomMultiplier = 1.0;
                }
            }
        });

        const joystickBase = document.getElementById('joystick-base'); const joystickStick = document.getElementById('joystick-stick');
        let joystickTouchId = null, joyX = 0, joyY = 0;

        window.addEventListener('touchstart', (e) => {
            if (!isTouch || e.target.closest('#start-screen') || e.target.closest('#settings-modal') || e.target.closest('#boost-btn')) return;
            if (controlOpt === 'touch') { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; return; }
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && joystickTouchId === null) {
                    joystickTouchId = t.identifier; joyX = t.clientX; joyY = t.clientY;
                    const bRect = joystickBase.getBoundingClientRect();
                    joystickBase.style.left = `${joyX - bRect.width / 2}px`; joystickBase.style.top = `${joyY - bRect.height / 2}px`; joystickBase.style.bottom = 'auto';
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isTouch || e.target.closest('#start-screen') || e.target.closest('#settings-modal')) return;
            if (controlOpt === 'touch') { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; return; }
            if (joystickTouchId === null) return;
            for (let t of e.changedTouches) {
                if (t.identifier === joystickTouchId) {
                    let dx = t.clientX - joyX, dy = t.clientY - joyY;
                    let dist = Math.sqrt(dx * dx + dy * dy), max = joystickBase.offsetWidth / 2;
                    if (dist > max) { dx *= max / dist; dy *= max / dist; }
                    joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    let angle = Math.atan2(dy, dx);
                    mouseX = canvas.width / 2 + Math.cos(angle) * 200; mouseY = canvas.height / 2 + Math.sin(angle) * 200;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (controlOpt === 'touch') return;
            for (let t of e.changedTouches) {
                if (t.identifier === joystickTouchId) {
                    joystickTouchId = null; joystickStick.style.transform = `translate(-50%, -50%)`;
                    joystickBase.style.left = ''; joystickBase.style.top = ''; joystickBase.style.bottom = '';
                }
            }
        });
        window.addEventListener('touchcancel', (e) => { joystickTouchId = null; joystickStick.style.transform = `translate(-50%, -50%)`; joystickBase.style.left = ''; joystickBase.style.top = ''; joystickBase.style.bottom = ''; });

        const bBtn = document.getElementById('boost-btn');
        bBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isMouseDown = true; });
        bBtn.addEventListener('touchend', (e) => { e.preventDefault(); isMouseDown = false; });

        let lastLoopTime = performance.now();

        // --- UPDATE LOOP (LÓGICA) ---
        function update() {
            if (gameState !== 'PLAYING' && gameState !== 'DYING') return;

            const nowTime = performance.now();
            let dt = (nowTime - lastLoopTime) / 16.667;
            if (dt > 5) dt = 1;
            lastLoopTime = nowTime;

            for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03; if (p.life <= 0) particles.splice(i, 1); }
            for (let i = floatingTexts.length - 1; i >= 0; i--) { let ft = floatingTexts[i]; ft.y += ft.vy; ft.life -= 0.02; if (ft.life <= 0) floatingTexts.splice(i, 1); }
            for (let i = sparks.length - 1; i >= 0; i--) { let s = sparks[i]; s.x += s.vx; s.y += s.vy; s.life -= 0.05; if (s.life <= 0) sparks.splice(i, 1); }

            const lerpFactor = Math.min(1, 0.2 * dt);

            if (isOfflineMode) {
                let totalMass = 0;
                let activeEnts = 0;

                bots.forEach(b => { if (!b.isDead) { totalMass += b.length; activeEnts++; } });
                if (!player.isDead) { totalMass += player.length; activeEnts++; }

                let targetSize = 4000 + (activeEnts * 100) + (totalMass * 3);
                targetSize = Math.min(Math.max(targetSize, 4000), 25000);

                GAME_CONFIG.WORLD_SIZE += (targetSize - GAME_CONFIG.WORLD_SIZE) * 0.0002 * dt;
                CENTER = GAME_CONFIG.WORLD_SIZE / 2;

                GAME_CONFIG.TOTAL_FOOD = Math.floor((GAME_CONFIG.WORLD_SIZE * GAME_CONFIG.WORLD_SIZE) / 30000);
            }

            for (let i = foods.length - 1; i >= 0; i--) {
                let f = foods[i];
                if (f.type === 'NORMAL' && f.radius < f.targetRadius) {
                    f.radius += GAME_CONFIG.FOOD_GROWTH_RATE * dt;
                    f.scoreValue += (GAME_CONFIG.FOOD_GROWTH_RATE * 2) * dt;
                    f.growthValue = f.scoreValue * (GAME_CONFIG.GROWTH_PER_FOOD / GAME_CONFIG.SCORE_PER_FOOD);
                }

                if (f.type === 'FIREFLY') {
                    if (!player.isDead) {
                        let dToPlayer = Math.hypot(player.x - f.x, player.y - f.y);
                        if (dToPlayer < 400) {
                            let escapeAngle = Math.atan2(f.y - player.y, f.x - player.x);
                            f.vx += Math.cos(escapeAngle) * 0.3 * dt;
                            f.vy += Math.sin(escapeAngle) * 0.3 * dt;
                        }
                    }

                    let speed = Math.hypot(f.vx, f.vy);
                    if (speed > GAME_CONFIG.FIREFLY_SPEED * 2) {
                        f.vx = (f.vx / speed) * GAME_CONFIG.FIREFLY_SPEED * 2;
                        f.vy = (f.vy / speed) * GAME_CONFIG.FIREFLY_SPEED * 2;
                    } else if (speed < GAME_CONFIG.FIREFLY_SPEED) {
                        f.vx *= 1.05; f.vy *= 1.05;
                    }

                    f.x += f.vx * dt;
                    f.y += f.vy * dt;

                    if (Math.hypot(f.x - CENTER, f.y - CENTER) > CENTER - 50) {
                        f.vx *= -1; f.vy *= -1;
                    }
                }
            }

            const updateEntityMovement = (ent, isBotOffline = false) => {
                if (ent.isDead) return;

                if (isBotOffline) {
                    processBotAI(ent, dt);
                    let diff = ent.targetAngle - ent.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;
                    ent.angle += diff * 0.1 * dt;

                    const moveSpeed = ent.isBoosting ? GAME_CONFIG.SNAKE_BASE_SPEED * GAME_CONFIG.BOOST_SPEED_MULT : GAME_CONFIG.SNAKE_BASE_SPEED;
                    ent.x += Math.cos(ent.angle) * moveSpeed * dt;
                    ent.y += Math.sin(ent.angle) * moveSpeed * dt;

                    if (Math.hypot(ent.x - CENTER, ent.y - CENTER) > CENTER - ent.radius * 0.8) {
                        ent.isDead = true; dropDeathFood(ent);
                        const idx = bots.indexOf(ent);
                        if (idx !== -1) { bots.splice(idx, 1); setTimeout(() => { bots.push(createLocalBot()); }, 500); }
                        return;
                    }

                    let hit = false;
                    if (!player.isDead && checkPerfectCollision(ent.x, ent.y, ent.radius, ent.angle, player)) hit = true;
                    for (let other of bots) {
                        if (other !== ent && !other.isDead && checkPerfectCollision(ent.x, ent.y, ent.radius, ent.angle, other)) hit = true;
                    }
                    if (hit) {
                        ent.isDead = true; dropDeathFood(ent);
                        const idx = bots.indexOf(ent);
                        if (idx !== -1) { bots.splice(idx, 1); setTimeout(() => { bots.push(createLocalBot()); }, 500); }
                        return;
                    }

                    for (let i = foods.length - 1; i >= 0; i--) {
                        const f = foods[i];
                        if (Math.hypot(ent.x - f.x, ent.y - f.y) < ent.radius + (f.radius || 2)) {
                            foods.splice(i, 1);
                            ent.score += f.scoreValue || GAME_CONFIG.SCORE_PER_FOOD;
                            ent.length = GAME_CONFIG.SNAKE_INITIAL_LENGTH + (ent.score * (GAME_CONFIG.GROWTH_PER_FOOD / GAME_CONFIG.SCORE_PER_FOOD));
                        }
                    }

                    if (foods.length < GAME_CONFIG.TOTAL_FOOD) {
                        foods.push(spawnFood('NORMAL'));
                    }

                    const pVx = Math.cos(ent.angle), pVy = Math.sin(ent.angle);
                    ent.distAccum = (ent.distAccum || 0) + moveSpeed * dt;
                    while (ent.distAccum >= GAME_CONFIG.SNAKE_HISTORY_STEP) {
                        ent.distAccum -= GAME_CONFIG.SNAKE_HISTORY_STEP;
                        ent.history.unshift({ x: ent.x - pVx * ent.distAccum, y: ent.y - pVy * ent.distAccum });
                    }
                    const targetLen = Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor(ent.length * GAME_CONFIG.SNAKE_HISTORY_SPACING) + 1);
                    if (ent.history.length > targetLen) ent.history.length = targetLen;

                } else if (ent.targetX !== undefined) {

                    let isCrashingLocally = false;
                    if (!player.isDead && checkPerfectCollision(ent.x, ent.y, ent.radius, ent.angle, player)) {
                        isCrashingLocally = true;
                    }

                    if (!isCrashingLocally) {
                        const moveSpeed = ent.isBoosting ? GAME_CONFIG.SNAKE_BASE_SPEED * GAME_CONFIG.BOOST_SPEED_MULT : GAME_CONFIG.SNAKE_BASE_SPEED;
                        ent.targetX += Math.cos(ent.targetAngle) * moveSpeed * dt;
                        ent.targetY += Math.sin(ent.targetAngle) * moveSpeed * dt;

                        const distToTarget = Math.hypot(ent.targetX - ent.x, ent.targetY - ent.y);
                        if (distToTarget > 100) {
                            const dx = ent.targetX - ent.x, dy = ent.targetY - ent.y;
                            ent.x = ent.targetX; ent.y = ent.targetY; ent.angle = ent.targetAngle;
                            for (let i = 0; i < (ent.history?.length || 0); i++) { ent.history[i].x += dx; ent.history[i].y += dy; }
                            ent.lastX = ent.x; ent.lastY = ent.y; ent.distAccum = 0;
                        } else {
                            ent.x += (ent.targetX - ent.x) * lerpFactor; ent.y += (ent.targetY - ent.y) * lerpFactor;
                            let aDiff = ent.targetAngle - ent.angle;
                            while (aDiff < -Math.PI) aDiff += Math.PI * 2; while (aDiff > Math.PI) aDiff -= Math.PI * 2;
                            ent.angle += aDiff * lerpFactor;

                            if (!ent.lastX) { ent.lastX = ent.x; ent.lastY = ent.y; }
                            const distMoved = Math.hypot(ent.x - ent.lastX, ent.y - ent.lastY);

                            ent.distAccum = (ent.distAccum || 0) + distMoved;
                            if (distMoved > 0.001) {
                                const vx = Math.cos(ent.angle), vy = Math.sin(ent.angle);
                                while (ent.distAccum >= GAME_CONFIG.SNAKE_HISTORY_STEP) {
                                    ent.distAccum -= GAME_CONFIG.SNAKE_HISTORY_STEP;
                                    ent.history.unshift({ x: ent.x - vx * ent.distAccum, y: ent.y - vy * ent.distAccum });
                                }
                                const targetLen = Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor((ent.length || GAME_CONFIG.SNAKE_INITIAL_LENGTH) * GAME_CONFIG.SNAKE_HISTORY_SPACING) + 1);
                                if (ent.history.length > targetLen) ent.history.length = targetLen;
                                ent.lastX = ent.x; ent.lastY = ent.y;
                            }
                        }
                    }
                }
                ent.radius = getEntityRadius(ent.length);
            };

            bots.forEach(b => updateEntityMovement(b, isOfflineMode));
            Object.values(otherPlayers).forEach(p => updateEntityMovement(p, false));

            const isBoosting = isMouseDown && player.length >= GAME_CONFIG.BOOST_MIN_LENGTH;
            let camTargetX = camera.x, camTargetY = camera.y;

            if (!player.isDead) {
                player.radius = getEntityRadius(player.length);

                const zoomFactor = 1 + Math.sqrt(Math.max(0, player.length - GAME_CONFIG.SNAKE_INITIAL_LENGTH)) * GAME_CONFIG.ZOOM_SHRINK_RATE;
                const autoZoom = Math.max(GAME_CONFIG.CAMERA_MIN_ZOOM, GAME_CONFIG.CAMERA_BASE_ZOOM / zoomFactor - (isBoosting ? 0.08 : 0));

                const targetZoom = autoZoom * manualZoomMultiplier;
                camera.zoom += (targetZoom - camera.zoom) * 0.04 * dt;

                player.length += (player.targetLength - player.length) * 0.1 * dt;

                const tx = (mouseX - canvas.width / 2) / camera.zoom + camera.x, ty = (mouseY - canvas.height / 2) / camera.zoom + camera.y;
                const targetAngle = Math.atan2(ty - player.y, tx - player.x);
                let diff = targetAngle - player.angle;
                while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;

                const growthDampening = Math.max(0.55, 1 - (player.length - 20) * 0.001);
                player.angle += diff * (isBoosting ? GAME_CONFIG.SNAKE_TURN_SPEED_BOOST : GAME_CONFIG.SNAKE_TURN_SPEED) * growthDampening * dt;

                if (isBoosting) {
                    player.speed = GAME_CONFIG.SNAKE_BASE_SPEED * GAME_CONFIG.BOOST_SPEED_MULT;
                    const tail = player.history[Math.floor(player.length * player.historySpacing)];
                    if (tail && Math.random() < 0.4) spawnSpark(tail.x, tail.y, player.angle);
                    player.boostCounter += dt;
                    if (player.boostCounter > GAME_CONFIG.BOOST_FRAMES_PER_DROP) {
                        player.boostCounter = 0;
                        player.targetLength = Math.max(GAME_CONFIG.SNAKE_INITIAL_LENGTH, player.targetLength - GAME_CONFIG.BOOST_LENGTH_LOSS);
                        player.score = Math.max(0, player.score - GAME_CONFIG.BOOST_SCORE_LOSS);

                        if (tail) {
                            foods.push(spawnFood('BOOST', tail.x, tail.y));
                        }
                    }
                } else {
                    player.speed = GAME_CONFIG.SNAKE_BASE_SPEED; player.boostCounter = 0;
                }

                player.x += Math.cos(player.angle) * player.speed * dt;
                player.y += Math.sin(player.angle) * player.speed * dt;

                let diedThisFrame = false;
                if (Math.sqrt((player.x - CENTER) ** 2 + (player.y - CENTER) ** 2) > CENTER - player.radius * 0.8) {
                    dropDeathFood(player); playerDie(); diedThisFrame = true;
                }

                if (!diedThisFrame) {
                    const enemies = [...bots, ...Object.values(otherPlayers)];
                    for (let e of enemies) {
                        if (!e.isDead && checkPerfectCollision(player.x, player.y, player.radius, player.angle, e)) {
                            dropDeathFood(player); playerDie(); diedThisFrame = true; break;
                        }

                        if (isOfflineMode) {
                            if (!e.isDead && checkPerfectCollision(e.x, e.y, e.radius, e.angle, player)) {
                                e.isDead = true;
                                dropDeathFood(e);
                            }
                        }
                    }
                }

                if (!diedThisFrame) {
                    const pVx = Math.cos(player.angle), pVy = Math.sin(player.angle);
                    player.distAccum = (player.distAccum || 0) + player.speed * dt;
                    while (player.distAccum >= GAME_CONFIG.SNAKE_HISTORY_STEP) {
                        player.distAccum -= GAME_CONFIG.SNAKE_HISTORY_STEP;
                        player.history.unshift({ x: player.x - pVx * player.distAccum, y: player.y - pVy * player.distAccum });
                    }
                    player.history.length = Math.min(GAME_CONFIG.MAX_HISTORY_LENGTH, Math.floor(player.length * player.historySpacing) + 1);

                    let lookDist = 0;
                    if (lookAheadOpt === 'on') {
                        lookDist = player.radius * GAME_CONFIG.CAMERA_LOOK_AHEAD * (isBoosting ? 1.8 : 1.0);
                    }
                    camTargetX = player.x + Math.cos(player.angle) * lookDist;
                    camTargetY = player.y + Math.sin(player.angle) * lookDist;
                } else {
                    camTargetX = player.x; camTargetY = player.y;
                }
            } else {
                camTargetX = player.x; camTargetY = player.y;
            }

            camera.x += (camTargetX - camera.x) * 0.06 * dt; camera.y += (camTargetY - camera.y) * 0.06 * dt;

            if (!player.isDead) {
                const magnet = player.radius * GAME_CONFIG.MAGNET_RADIUS_MULT;
                for (let i = foods.length - 1; i >= 0; i--) {
                    const f = foods[i], d = Math.sqrt((player.x - f.x) ** 2 + (player.y - f.y) ** 2);
                    if (d < player.radius + (f.radius || 3)) {
                        foods.splice(i, 1);
                        spawnParticles(f.x, f.y, f.color, f.type === 'DEATH' ? 15 : 8);

                        let pts = f.scoreValue;
                        let growth = f.growthValue;

                        spawnFloatingText(f.x, f.y, `+${Math.round(pts)}`, f.color);
                        player.targetLength += growth;
                        player.score += pts;

                        if (player.score > highScore) {
                            highScore = player.score; highScoreHomeElement.innerText = Math.floor(highScore);
                            localStorage.setItem('cobraioHighScore', highScore);
                        }
                        if (!isOfflineMode) socket.emit('eatFood', f.id);
                        if (isOfflineMode && foods.length < GAME_CONFIG.TOTAL_FOOD) foods.push(spawnFood('NORMAL'));
                    } else if (d < magnet) { f.x += (player.x - f.x) * GAME_CONFIG.MAGNET_STRENGTH; f.y += (player.y - f.y) * GAME_CONFIG.MAGNET_STRENGTH; }
                }

                if (!isOfflineMode && Date.now() - lastUpdateTime > 25) {
                    lastUpdateTime = Date.now();
                    socket.emit('update', { x: player.x, y: player.y, angle: player.angle, score: player.score, length: player.length, radius: player.radius, isBoosting: isBoosting });
                }
            }

            if (Date.now() % 30 < 2) updateLeaderboard();
        }

        function updateLeaderboard() {
            const list = [...bots, ...Object.values(otherPlayers), player].map(p => ({ name: p.name, score: p.score || 0, isPlayer: p === player, ref: p })).sort((a, b) => b.score - a.score);
            const pIdx = list.findIndex(x => x.isPlayer);
            list.forEach(p => p.ref.isTop1 = false);
            if (list.length > 0) list[0].ref.isTop1 = true;

            leaderList.innerHTML = list.slice(0, 10).map((p, i) => {
                const skinColor = getSkinColor(p.ref.skinIndex);
                return `
                <div class="leader-item">
                    <span class="rank-num">#${i + 1}</span>
                    <span class="leader-name" style="color: ${skinColor};">${p.name}</span>
                    <span class="leader-score">${Math.floor(p.score)}</span>
                </div>
            `}).join('') + (pIdx >= 10 ? `
                <div style="text-align:center; font-size:10px; opacity:0.3; margin:2px 0;">...</div>
                <div class="leader-item my-rank">
                    <span class="rank-num">#${pIdx + 1}</span>
                    <span class="leader-name" style="color: ${getSkinColor(player.skinIndex)};">${player.name}</span>
                    <span class="leader-score">${Math.floor(player.score)}</span>
                </div>
            ` : '');
        }

        function drawSnake(context, entity, activeSkin, isBoosting, customSpacing) {
            if (!activeSkin || !activeSkin.getBodyColor) activeSkin = skins[0];
            if (entity.isDead) return;

            const radius = Math.max(10, entity.radius || 20);
            const spacing = customSpacing || GAME_CONFIG.SNAKE_HISTORY_SPACING || 5;
            const segments = Math.max(1, Math.floor(entity.length || 10));
            const isHigh = qualityOpt === 'high';

            if (!entity.history || entity.history.length < 2) { entity.history = Array.from({ length: 20 }, () => ({ x: entity.x, y: entity.y })); }

            const availableSegments = Math.max(1, Math.min(segments, Math.floor((entity.history.length - 1) / spacing)));

            let lodMult = 1;
            if (camera.zoom < 0.6) lodMult = 2;
            if (camera.zoom < 0.35) lodMult = 3;

            context.save();
            context.lineCap = 'round';
            context.lineJoin = 'round';

            if (isHigh && isBoosting) { context.shadowBlur = 10; context.shadowColor = activeSkin.getBodyColor(false, 0, segments)[0]; }

            if (activeSkin.isCentipede && availableSegments > 2) {
                context.save();
                context.lineWidth = radius * 0.6;
                context.strokeStyle = activeSkin.legColor || '#000';
                if (isHigh) {
                    context.shadowColor = 'rgba(0,0,0,0.6)';
                    context.shadowBlur = 4;
                    context.shadowOffsetY = 2;
                }
                for (let i = 1; i < availableSegments; i += 2) {
                    const p1 = entity.history[i * spacing];
                    const p2 = entity.history[(i - 1) * spacing];
                    if (!p1 || !p2) continue;

                    const segAngle = Math.atan2(p1.y - p2.y, p1.x - p2.x);
                    const legLen = radius * 1.8;
                    const legAnim = Math.sin((entity.distAccum || 0) * 0.15 + i) * 0.5;

                    context.beginPath();
                    context.moveTo(p1.x, p1.y);
                    context.lineTo(p1.x + Math.cos(segAngle - 1.3 + legAnim) * legLen, p1.y + Math.sin(segAngle - 1.3 + legAnim) * legLen);
                    context.stroke();

                    context.beginPath();
                    context.moveTo(p1.x, p1.y);
                    context.lineTo(p1.x + Math.cos(segAngle + 1.3 - legAnim) * legLen, p1.y + Math.sin(segAngle + 1.3 - legAnim) * legLen);
                    context.stroke();
                }
                context.restore();
            }

            if (activeSkin.hasWings && availableSegments >= 3) {
                const neckIdx = Math.min(availableSegments - 1, 3);
                const neckPos = entity.history[neckIdx * spacing] || { x: entity.x, y: entity.y };
                const wingAng = entity.angle;
                const flapAnim = Math.sin((entity.distAccum || 0) * 0.08) * 0.5;

                const drawWing = (side) => {
                    context.save();
                    context.translate(neckPos.x, neckPos.y);
                    context.rotate(wingAng);
                    context.scale(1, side * (1 - Math.abs(flapAnim) * 0.5));

                    context.fillStyle = activeSkin.wingColor || '#fff';
                    context.strokeStyle = 'rgba(0,0,0,0.5)';
                    context.lineWidth = 2;

                    context.beginPath();
                    context.moveTo(0, 0);
                    context.bezierCurveTo(-radius, radius * 3, -radius * 5, radius * 4, -radius * 2, radius * 0.5);
                    context.bezierCurveTo(-radius * 1.5, radius * 0.2, -radius * 0.5, radius * 0.5, 0, 0);
                    context.fill();
                    context.stroke();
                    context.restore();
                };
                drawWing(1);
                drawWing(-1);
            }

            context.lineWidth = (radius * 2) + 4;
            context.strokeStyle = '#000000';
            context.beginPath(); context.moveTo(entity.x, entity.y);
            for (let i = 1; i < availableSegments; i++) {
                const pos = entity.history[i * spacing];
                if (pos) context.lineTo(pos.x, pos.y);
            }
            context.stroke();

            for (let i = availableSegments - 1; i >= 0; i -= lodMult) {
                const pos = i === 0 ? { x: entity.x, y: entity.y } : entity.history[i * spacing];
                if (!pos || isNaN(pos.x)) continue;
                let isDark = Math.floor(i / 4) % 2 === 0;

                const baseColors = activeSkin.getBodyColor(isDark, i, availableSegments);
                let c = activeSkin.getTailColor && activeSkin.getTailColor(availableSegments - i) ? activeSkin.getTailColor(availableSegments - i) : { c1: baseColors[0], c2: baseColors[1] };

                context.fillStyle = c.c1 || '#fff';
                context.beginPath(); context.arc(pos.x, pos.y, radius, 0, Math.PI * 2); context.fill();
            }

            if (isHigh) {
                context.save(); context.lineCap = 'round'; context.lineJoin = 'round';
                context.lineWidth = radius * 0.8; context.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                context.beginPath(); let first = true;
                for (let i = segments - 1; i > 0; i -= lodMult) {
                    const pos = entity.history[i * spacing];
                    if (!pos) continue;
                    if (first) { context.moveTo(pos.x, pos.y); first = false; } else context.lineTo(pos.x, pos.y);
                }
                if (!first) context.lineTo(entity.x, entity.y);
                context.stroke(); context.restore();
            }

            if (activeSkin.isCyclops) {
                const distOffset = 0.4;
                const ex = entity.x + Math.cos(entity.angle) * radius * distOffset;
                const ey = entity.y + Math.sin(entity.angle) * radius * distOffset;
                const eR = radius * 0.65;

                context.fillStyle = '#000';
                context.beginPath(); context.arc(ex, ey, eR + 1.5, 0, Math.PI * 2); context.fill();
                context.fillStyle = '#fff';
                context.beginPath(); context.arc(ex, ey, eR, 0, Math.PI * 2); context.fill();

                const pR = eR * 0.5;
                const px = ex + Math.cos(entity.angle) * pR * 0.3;
