<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>cobra.io - Edição Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --neon-blue: #00ddff;
            --neon-pink: #ff00aa;
            --neon-green: #56ab2f;
            --neon-green-dark: #3a7d20;
            --bg-dark: #0b0e14;
            --glass-bg: rgba(11, 14, 20, 0.75);
            font-family: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: white;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- HUD LIVE SCORE --- */
        #live-hud {
            position: absolute;
            top: env(safe-area-inset-top, 15px);
            left: env(safe-area-inset-left, 15px);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 10;
            display: none;
            border-left: 3px solid var(--neon-green);
        }

        #live-hud .hud-title {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        #live-hud .hud-score {
            font-size: 22px;
            font-weight: 900;
            color: white;
            font-variant-numeric: tabular-nums;
        }

        /* --- HUD LEADERBOARD --- */
        #leaderboard {
            position: absolute;
            top: env(safe-area-inset-top, 15px);
            right: env(safe-area-inset-right, 15px);
            width: clamp(140px, 25vw, 220px);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        #leaderboard h3 {
            margin: 0 0 8px 0;
            font-size: clamp(12px, 3vw, 16px);
            text-align: right;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
        }

        .leader-item {
            display: flex;
            justify-content: flex-end;
            font-size: clamp(10px, 2vw, 12px);
            line-height: 1.4;
            font-weight: 500;
        }

        .rank-num {
            width: 20px;
            text-align: left;
            opacity: 0.6;
        }

        .leader-name {
            flex-grow: 1;
            text-align: left;
            padding-left: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .leader-score {
            width: 50px;
            text-align: right;
            opacity: 0.8;
            font-variant-numeric: tabular-nums;
        }

        .my-rank {
            color: var(--neon-blue);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 4px;
            padding-top: 4px;
            font-weight: 700;
        }

        /* --- Menu Inicial --- */
        #start-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(11, 25, 40, 0.8), var(--bg-dark));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            padding: clamp(10px, 3vw, 20px);
            transition: opacity 0.4s ease;
        }

        .main-logo {
            font-size: clamp(40px, 12vw, 80px);
            font-weight: 900;
            text-transform: lowercase;
            background: linear-gradient(to right, #fff, var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(86, 171, 47, 0.4));
            margin-bottom: 0.2rem;
            text-align: center;
            line-height: 1;
        }

        .home-record-display {
            font-size: clamp(10px, 3vw, 14px);
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: clamp(10px, 3vw, 20px);
            font-weight: 600;
        }

        .home-record-display span {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(86, 171, 47, 0.5);
        }

        #game-over-msg {
            color: #ff4444;
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
            font-size: clamp(16px, 4vw, 20px);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.4);
            animation: pulse 2s infinite;
        }

        .final-score-text {
            display: block;
            font-size: clamp(12px, 3vw, 14px);
            color: white;
            text-shadow: none;
            margin-top: 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .final-score-text span {
            color: var(--neon-green);
        }

        @keyframes pulse {
            0% {
                opacity: 0.8;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.8;
            }
        }

        .menu-card {
            background: var(--glass-bg);
            padding: clamp(15px, 4vw, 30px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 380px;
            max-height: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            gap: 12px;
        }

        #player-name {
            width: 100%;
            padding: clamp(12px, 3vw, 16px);
            font-size: clamp(14px, 4vw, 16px);
            font-family: inherit;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(86, 171, 47, 0.3);
            border-radius: 1rem;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #player-name:focus {
            outline: none;
            border-color: var(--neon-green);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(86, 171, 47, 0.2);
        }

        .skin-selector {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .carousel-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 5px;
        }

        .carousel-btn {
            background: linear-gradient(to bottom, var(--neon-green), var(--neon-green-dark));
            border: none;
            width: 40px;
            height: 35px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .carousel-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.5));
        }

        .carousel-btn:active {
            transform: scale(0.95);
        }

        #skin-name {
            font-weight: 800;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 10px;
        }

        #preview-canvas {
            width: 100%;
            max-width: 200px;
            height: auto;
            aspect-ratio: 2 / 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            width: 100%;
        }

        #start-btn {
            padding: clamp(12px, 3vw, 16px);
            font-size: clamp(14px, 4vw, 18px);
            font-family: inherit;
            font-weight: 900;
            background: linear-gradient(to bottom, var(--neon-green), var(--neon-green-dark));
            border: none;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #255215;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #255215;
        }

        #settings-open-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            width: clamp(45px, 12vw, 55px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        #settings-open-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        #settings-open-btn svg {
            width: 24px;
            height: 24px;
            stroke: rgba(255, 255, 255, 0.5);
            stroke-width: 2;
            fill: none;
        }

        /* --- CONFIGURAÇÕES (MODAL) --- */
        #settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .settings-content {
            background: var(--bg-dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 320px;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .settings-header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--neon-green);
            text-transform: uppercase;
        }

        .settings-close {
            background: none;
            border: none;
            color: white;
            opacity: 0.5;
            font-size: 24px;
            cursor: pointer;
        }

        .settings-group {
            margin-bottom: 15px;
        }

        .settings-group label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.5;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .settings-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }

        .opt-btn.active {
            background: var(--neon-green);
            border-color: var(--neon-green);
            color: white;
            box-shadow: 0 0 15px rgba(86, 171, 47, 0.4);
        }

        /* --- MOBILE CONTROLS --- */
        #mobile-controls {
            display: none;
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }

        #joystick-base {
            position: absolute;
            width: clamp(80px, 15vw, 120px);
            height: clamp(80px, 15vw, 120px);
            left: clamp(20px, 5vw, 40px);
            bottom: clamp(20px, 5vw, 40px);
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: auto;
        }

        #joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40%;
            height: 40%;
            background: var(--neon-green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-green);
        }

        #boost-btn {
            position: absolute;
            width: clamp(60px, 12vw, 80px);
            height: clamp(60px, 12vw, 80px);
            right: clamp(20px, 5vw, 40px);
            bottom: clamp(20px, 5vw, 40px);
            background: rgba(255, 0, 170, 0.2);
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            color: white;
            font-size: clamp(10px, 2.5vw, 14px);
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(255, 0, 170, 0.3);
        }

        /* Ajustes Mobile Portrait (Em pé) */
        @media screen and (orientation: portrait) {
            #start-screen {
                justify-content: flex-start;
                padding-top: 15vh;
            }

            .menu-card {
                max-width: 90vw;
            }

            #leaderboard {
                top: auto;
                bottom: 15px;
                right: 15px;
                width: 160px;
            }

            #live-hud {
                top: env(safe-area-inset-top, 15px);
                left: 15px;
            }

            #joystick-base {
                bottom: 80px;
                left: 20px;
            }

            #boost-btn {
                bottom: 80px;
                right: 20px;
            }
        }

        /* --- LANDSCAPE MOBILE OPTIMIZATION --- */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            #start-screen {
                flex-direction: row;
                gap: 40px;
                padding: 10px 40px;
                justify-content: center;
            }

            .main-logo {
                font-size: 40px;
                margin-bottom: 0px;
            }

            .home-record-display {
                font-size: 10px;
                margin-bottom: 5px;
            }

            #game-over-msg {
                font-size: 14px;
                margin-bottom: 5px;
            }

            .final-score-text {
                font-size: 10px;
            }

            .menu-card {
                padding: 15px;
                gap: 8px;
                max-width: 320px;
                border-radius: 1.5rem;
            }

            #player-name {
                padding: 8px;
                font-size: 14px;
            }

            .skin-selector {
                padding: 5px;
                gap: 2px;
            }

            #preview-canvas {
                max-width: 140px;
            }

            #start-btn {
                padding: 10px;
                font-size: 14px;
                box-shadow: 0 4px 0 #255215;
            }

            #start-btn:active {
                transform: translateY(2px);
                box-shadow: 0 2px 0 #255215;
            }

            #settings-open-btn {
                width: 45px;
                padding: 5px;
            }

            .settings-content {
                padding: 15px;
                max-width: 400px;
            }

            .settings-header {
                margin-bottom: 10px;
            }

            .settings-group {
                margin-bottom: 10px;
            }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

    <!-- HUD em Tempo Real -->
    <div id="live-hud">
        <div class="hud-title">Score</div>
        <div class="hud-score" id="live-score-val">0</div>
    </div>

    <div id="start-screen">
        <div>
            <div class="main-logo">cobra.io</div>
            <div class="home-record-display">RECORDE: <span id="high-score-home">0</span></div>
            <div id="game-over-msg" style="display: none;">
                VOCÊ MORREU
                <span class="final-score-text">PONTUAÇÃO FINAL: <span id="final-score-val">0</span></span>
            </div>
        </div>

        <div class="menu-card">
            <input type="text" id="player-name" placeholder="TEU NICKNAME" maxlength="15">

            <div class="skin-selector">
                <div class="carousel-controls">
                    <button class="carousel-btn" id="prev-skin">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" />
                        </svg>
                    </button>
                    <span id="skin-name">Clássica (USA)</span>
                    <button class="carousel-btn" id="next-skin">
                        <svg viewBox="0 0 24 24">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" />
                        </svg>
                    </button>
                </div>
                <canvas id="preview-canvas" width="200" height="100"></canvas>
            </div>

            <div class="action-grid">
                <button id="start-btn">JOGAR</button>
                <button id="settings-open-btn">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONFIGURAÇÕES -->
    <div id="settings-modal">
        <div class="settings-content">
            <div class="settings-header">
                <h2>Configurações</h2>
                <button class="settings-close" id="settings-close-btn">&times;</button>
            </div>

            <div class="settings-group">
                <label>Qualidade Gráfica</label>
                <div class="settings-options">
                    <button class="opt-btn" id="q-high" onclick="setOpt('quality', 'high')">Alta</button>
                    <button class="opt-btn" id="q-low" onclick="setOpt('quality', 'low')">Baixa</button>
                </div>
            </div>

            <div class="settings-group" id="controls-group" style="display:none;">
                <label>Tipo de Controlo (Mobile)</label>
                <div class="settings-options">
                    <button class="opt-btn" id="c-joystick" onclick="setOpt('control', 'joystick')">Joystick</button>
                    <button class="opt-btn" id="c-touch" onclick="setOpt('control', 'touch')">Seguir Dedo</button>
                </div>
            </div>
        </div>
    </div>

    <div id="leaderboard">
        <h3>LÍDERES</h3>
        <div id="leader-list"></div>
    </div>

    <div id="mobile-controls">
        <div id="joystick-base" style="display:none;">
            <div id="joystick-stick"></div>
        </div>
        <div id="boost-btn">BOOST</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // =============================================================
        // --- BLOCO DE CONFIGURAÇÃO DO JOGO (AJUSTE AQUI) ---
        // =============================================================
        const GAME_CONFIG = {
            // 🌍 1. CONFIGURAÇÕES DO MUNDO (MAPA)
            WORLD_SIZE: 8000,                 // Tamanho total da arena (8000x8000 pixels)
            TOTAL_FOOD: 1500,                 // Quantidade máxima de comida normal espalhada pelo mapa em simultâneo

            // 🐍 2. CONFIGURAÇÕES BASE DA COBRA
            SNAKE_INITIAL_LENGTH: 26,         // Tamanho inicial da cobra ao nascer (quantidade de gomos virtuais)
            SNAKE_INITIAL_RADIUS: 20,         // Grossura inicial da cabeça e do corpo ao nascer (em pixels)
            SNAKE_MAX_RADIUS: 36,             // Limite máximo de grossura que a cobra pode atingir ao crescer muito
            SNAKE_HISTORY_STEP: 1,            // Precisão da física: guarda a posição a cada 1 pixel (garante movimento 100% fluido sem tremer)
            SNAKE_HISTORY_SPACING: 5,         // Distância visual entre as listras desenhadas (ajustado para formar o "tubo perfeito" contínuo)
            SNAKE_BASE_SPEED: 3.0,            // Velocidade base unificada para garantir crescimento justo em todas as plataformas

            // 💥 3. DINÂMICA DE COLISÃO E ROTAÇÃO (CURVAS)
            SNAKE_HITBOX_SIZE: 0.75,          // Área de colisão letal: a cabeça tem de entrar 75% no corpo inimigo para a tua cobra morrer
            SNAKE_TURN_SPEED: 0.035,          // Rapidez máxima de curva da cobra (valores baixos obrigam a fazer curvas suaves em formato de '8')
            SNAKE_TURN_SPEED_BOOST: 0.015,    // Rapidez de curva ao correr com o Boost (fica mais "dura" e faz curvas bem mais abertas)

            // 🍎 4. ALIMENTAÇÃO, CRESCIMENTO E PONTUAÇÃO
            GROWTH_PER_FOOD: 0.5,             // Quanto a cobra cresce em comprimento por cada partícula de comida normal absorvida
            SCORE_PER_FOOD: 10,               // Quantos pontos ganhas no "Score" por cada partícula de comida normal
            DEATH_GROWTH: 0.25,               // Quanto a cobra cresce ao absorver restos brilhantes de uma cobra morta (dá muito mais tamanho)
            DEATH_SCORE: 30,                  // Quantos pontos ganhas por restos de cobra morta
            WIDTH_GROWTH_FACTOR: 0.01,        // Fator de engordamento: quão rápido a cobra fica mais grossa à medida que fica mais comprida
            MAGNET_STRENGTH: 0.0,             // Força de atração do "ímã" da cabeça (DESATIVADO por pedido do utilizador)
            MAGNET_RADIUS_MULT: 3.0,          // Área de alcance do ímã (raio da cabeça multiplicado por este valor)

            // 🚀 5. MECÂNICA DE BOOST (ACELERAÇÃO)
            BOOST_SPEED_MULT: 2.0,            // Multiplicador de velocidade ao correr (Ex: 2.0 = o dobro da velocidade base)
            BOOST_SCORE_LOSS: 2,              // Quantidade de pontos subtraídos continuamente ao teu Score enquanto aceleras
            BOOST_LENGTH_LOSS: 0.3,           // Tamanho do corpo perdido continuamente enquanto corres (encolhimento)
            BOOST_MIN_LENGTH: 10,             // Tamanho mínimo obrigatório para usar o boost (impede de correr se fores muito pequeno)
            BOOST_FRAMES_PER_DROP: 3,         // A cada quantos *frames* (ciclos de ecrã) a cobra deita fora um resto de comida brilhante pelo rabo

            // 🤖 6. INTELIGÊNCIA ARTIFICIAL (BOTS)
            NUM_BOTS: 10,                     // Quantidade de cobras inimigas (controladas pelo computador) a vagar no mapa
            SPAWN_DELAY: 100,                 // Tempo de espera (em ciclos) até nascer um novo Bot após um antigo ter morrido
            SPAWN_SAFE_RADIUS: 1200,          // Zona segura: os bots nunca nascem a menos desta distância de ti (evita mortes surpresa)
            BOT_SPEED_MULTIPLIER_MOBILE: 0.75,// Desvantagem do Bot: reduz a velocidade da IA em 25% se tu estiveres a jogar num Telemóvel
            BOT_VISION_RADIUS: 800,           // Raio de visão do bot: a que distância ele "deteta" outras cobras para atacar ou fugir
            BOT_AVOID_RADIUS_MULT: 5,         // Multiplicador do radar anti-colisão: faz o bot tentar desviar-se das outras cobras

            // 🎥 7. CÂMARA E EFEITOS DE VISÃO
            CAMERA_BASE_ZOOM: 1.0,            // Nível de Zoom padrão (aproximação do ecrã) quando a cobra é pequena
            CAMERA_MIN_ZOOM: 0.6,             // Limite máximo de afastamento (zoom out) permitido quando a cobra for gigante
            ZOOM_SHRINK_RATE: 0.0006,         // Rapidez com que a câmara afasta progressivamente enquanto vais ganhando tamanho
            CAMERA_LOOK_AHEAD: 15,            // "Olhar em frente": efeito cinemático que atira a câmara ligeiramente na direção do teu movimento

            // ✨ 8. EFEITOS VISUAIS E PARTÍCULAS
            DEATH_FOOD_RADIUS: 2,             // Tamanho exato em pixels da "comida de morte" (os restos deixados pelas cobras)
            DEATH_FOOD_STEP: 15,              // Distância entre cada rasto de comida caída para desenhar a silhueta do cadáver na perfeição
            FOOD_GLOW_MULT_NORMAL: 3.5,       // Intensidade e alcance do brilho (halo de luz) da comida normal flutuante
            FOOD_GLOW_MULT_DEATH: 2.0         // Intensidade do brilho da comida de morte (mais contido para manter a forma da cobra que morreu)
        };

        const CENTER = GAME_CONFIG.WORLD_SIZE / 2;

        let qualityOpt = localStorage.getItem('cobraioQuality') || 'high';

        function applySettingsUI() {
            document.getElementById('q-high').classList.toggle('active', qualityOpt === 'high');
            document.getElementById('q-low').classList.toggle('active', qualityOpt === 'low');
            document.getElementById('c-joystick').classList.toggle('active', controlOpt === 'joystick');
            document.getElementById('c-touch').classList.toggle('active', controlOpt === 'touch');

            const jBase = document.getElementById('joystick-base');

            }

        function setOpt(type, val) {
            if (type === 'quality') { qualityOpt = val; localStorage.setItem('cobraioQuality', val); }
            if (type === 'control') { controlOpt = val; localStorage.setItem('cobraioControl', val); }
            applySettingsUI();
        }

        document.getElementById('settings-open-btn').onclick = () => {
            applySettingsUI();
            document.getElementById('settings-modal').style.display = 'flex';

        document.getElementById('settings-close-btn').onclick = () => {

        const canvas = document.getElementById('gameCanvas');

        const liveScoreVal = document.getElementById('live-score-val');

        // --- MULTIPLAYER SETUP ---
        const socket = io();
        let myId = null;
        let lastUpdateTime = 0;
        const otherPlayers = {};

        socket.on('init', (data) => {
            player.id = data.id;
            // Clear and sync players
            Object.keys(otherPlayers).forEach(id => delete otherPlayers[id]);
            Object.keys(data.players).forEach(id => {
                if (id !== player.id) otherPlayers[id] = data.players[id];
            });
            // Sync food
            foods.length = 0;
            if (data.foods) foods.push(...data.foods);

            if (data.bots) {
                bots = data.bots.map(b => {
                    b.targetX = b.x; b.targetY = b.y; b.targetAngle = b.angle;
                    return b;
                });
            }
            updateLeaderboard();
        });

        socket.on('botsUpdated', (serverBots) => {
            // Sincronizar bots do servidor
            serverBots.forEach(sb => {
                let b = bots.find(x => x.id === sb.id);
                if (!b) {
                    sb.targetX = sb.x; sb.targetY = sb.y; sb.targetAngle = sb.angle;
                    bots.push(sb);
                } else {
                    b.targetX = sb.x; b.targetY = sb.y; b.targetAngle = sb.angle;
                    b.score = sb.score; b.length = sb.length; b.radius = sb.radius;
                    // Sincronizar histórico básico para renderização
                    if (sb.history) {
                        if (!b.history || b.history.length !== sb.history.length) b.history = sb.history;
                        else {
                            for(let i=0; i<sb.history.length; i++) {
                                b.history[i].tx = sb.history[i].x;
                                b.history[i].ty = sb.history[i].y;
                            }
                        }
                    }
                }
            });
            // Remover bots que não estão mais no servidor
            bots = bots.filter(b => serverBots.find(sb => sb.id === b.id));
            updateLeaderboard();
        });

        socket.on('playerJoined', (p) => {
            if (p.id !== player.id) otherPlayers[p.id] = p;
        });

        socket.on('playerUpdated', (data) => {
            if (data.id === player.id) return;
            let p = otherPlayers[data.id];
            if (!p) {
                otherPlayers[data.id] = data;
                return;
            }

            // Suavização da cabeça
            p.targetX = data.x;
            p.targetY = data.y;
            p.targetAngle = data.angle;

            p.score = data.score;
            p.length = data.length;
            p.radius = data.radius;
            p.isBoosting = data.isBoosting;

            // Suavização do corpo: em vez de substituir, atualizamos os alvos das coordenadas
            if (p.history && data.history && p.history.length === data.history.length) {
                for (let i = 0; i < p.history.length; i++) {
                    p.history[i].tx = data.history[i].x;
                    p.history[i].ty = data.history[i].y;
                }
            } else {
                // Se o tamanho mudou, aceitamos o salto uma vez
                p.history = data.history;
            }

            p.lastPacketTime = Date.now();
        });

        socket.on('playerLeft', (id) => {
            delete otherPlayers[id];
        });

        socket.on('foodEaten', (data) => {
            const index = foods.findIndex(f => f.id === data.foodId);
            if (index !== -1) {
                const f = foods[index];
                spawnParticles(f.x, f.y, f.color, f.isDeathFood ? 15 : 8);
                foods.splice(index, 1);

        let gameState = 'START';
        let highScore = localStorage.getItem('cobraioHighScore') || 0;

        let camera = { x: CENTER, y: CENTER, zoom: GAME_CONFIG.CAMERA_BASE_ZOOM, shake: 0 };
        const neonColors = ['#ff0055', '#00ffaa', '#00ddff', '#ffdd00', '#ff6600', '#aa00ff', '#e0e0ff', '#ff00aa'];

        const particles = [];
        const floatingTexts = [];
        const sparks = [];

        function spawnParticles(x, y, color, amount = 8) {
            if (qualityOpt === 'low') return;
            for (let i = 0; i < amount; i++) {
                const speed = Math.random() * 6 + 2;
                const angle = Math.random() * Math.PI * 2;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1, color
                });
            }
        }

        function spawnFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, life: 1, vy: -1.5 });
        }

        function spawnSpark(x, y, angle) {
            if (qualityOpt === 'low') return;
            const sparkColors = ['#ffffff', '#00ddff', '#aaddff'];
            sparks.push({
                x, y,
                vx: -Math.cos(angle) * (Math.random() * 3 + 1) + (Math.random() - 0.5) * 2,
                vy: -Math.sin(angle) * (Math.random() * 3 + 1) + (Math.random() - 0.5) * 2,
                life: 1,
                color: sparkColors[Math.floor(Math.random() * sparkColors.length)]
            });
        }

        const skins = [
            { name: 'Clássica (USA)', getBodyColor: (isDark) => isDark ? ['#444444', '#0a0a0a'] : ['#ffffff', '#777777'], getTailColor: (p) => p <= 4 ? { c1: '#4466ff', c2: '#001166', stars: true } : p <= 6 ? { c1: '#ff4444', c2: '#660000' } : p <= 8 ? { c1: '#ffffff', c2: '#888888' } : null },
            { name: 'Tóxica Neon', getBodyColor: (isDark) => isDark ? ['#005500', '#001100'] : ['#00ff00', '#007700'] },
            { name: 'Cyberpunk', getBodyColor: (isDark) => isDark ? ['#ff00aa', '#550033'] : ['#00ddff', '#005577'], getTailColor: (p) => p <= 4 ? { c1: '#ffffff', c2: '#aaaaaa' } : null },
            { name: 'Tigre de Fogo', getBodyColor: (isDark) => isDark ? ['#111111', '#000000'] : ['#ff8800', '#aa3300'] },
            { name: 'Espectro', getBodyColor: (isDark) => isDark ? ['#aaddff', '#5588aa'] : ['#ffffff', '#bbddff'], getTailColor: (p) => p <= 6 ? { c1: '#ffffff', c2: '#dddddd' } : null },
            { name: 'Arco-íris', getBodyColor: (isDark, i, segs) => { const h = (i / Math.max(segs, 1)) * 360; return isDark ? [`hsl(${h}, 100%, 35%)`, `hsl(${h}, 100%, 15%)`] : [`hsl(${h}, 100%, 60%)`, `hsl(${h}, 100%, 40%)`]; } },
            { name: 'Dourada Premium', getBodyColor: (isDark) => isDark ? ['#cca600', '#665300'] : ['#ffdd00', '#aa9400'], getTailColor: (p) => p <= 3 ? { c1: '#ffffff', c2: '#aaaaaa' } : null },
            { name: 'Zebra', getBodyColor: (isDark) => isDark ? ['#111111', '#000000'] : ['#ffffff', '#aaaaaa'] },
            { name: 'Galáxia', getBodyColor: (isDark) => isDark ? ['#1a0033', '#0d001a'] : ['#aa00ff', '#550088'], getTailColor: (p) => p <= 5 ? { c1: '#00ddff', c2: '#005588' } : null },
            { name: 'Lava', getBodyColor: (isDark) => isDark ? ['#880000', '#440000'] : ['#ff4400', '#aa2200'], getTailColor: (p) => p <= 4 ? { c1: '#ffdd00', c2: '#ff8800' } : null }
        ];
        let currentSkinIndex = 0;

        const botNames = [
            "TWITCH_M1UNO", "LND! Bolado", "Flamengo", "Cobra Rosa S2", "GABRIEL01",
            "SERGIO / XPBR", "CHILE", "ARGENTINA", "Uruguai_Rex", "Mexico_Neon"
        ];

        const player = {
            x: CENTER, y: CENTER, angle: 0,
            speed: GAME_CONFIG.SNAKE_BASE_SPEED_PC,
            radius: GAME_CONFIG.SNAKE_INITIAL_RADIUS,
            length: GAME_CONFIG.SNAKE_INITIAL_LENGTH,
            history: [], historySpacing: GAME_CONFIG.SNAKE_HISTORY_SPACING,
            score: 0, boostCounter: 0, name: '', isTop1: false, distAccum: 0
        };
        const foods = [];

        let bots = []; // Agora preenchido pelo servidor
        let spawnTimer = 20;

        function getSafePosition(ignoreSelf = false) {
            let attempts = 0;
            while (attempts < 50) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * (CENTER - 1000);
                const x = CENTER + Math.cos(angle) * r;
                const y = CENTER + Math.sin(angle) * r;
                
                let isSafe = true;

                // Verificar distância de nós próprios (se necessário)
                if (!ignoreSelf) {
                    const distToPlayer = Math.hypot(x - player.x, y - player.y);
                    if (distToPlayer < GAME_CONFIG.SPAWN_SAFE_RADIUS) isSafe = false;
                }

                // Verificar distância de todos os bots
                if (isSafe) {
                    for (let bot of bots) {
                        if (Math.hypot(x - bot.x, y - bot.y) < GAME_CONFIG.SPAWN_SAFE_RADIUS) {
                            isSafe = false;
                            break;
                        }
                    }
                }

                // Verificar distância de outros jogadores online
                if (isSafe) {
                    for (let id in otherPlayers) {
                        let op = otherPlayers[id];
                        if (Math.hypot(x - op.x, y - op.y) < GAME_CONFIG.SPAWN_SAFE_RADIUS) {
                            isSafe = false;
                            break;
                        }
                    }
                }

                if (isSafe) return { x, y };
                attempts++;
            }
            // Fallback se não encontrar lugar seguro (raro)
            return { x: Math.random() * GAME_CONFIG.WORLD_SIZE, y: Math.random() * GAME_CONFIG.WORLD_SIZE };
        }

        function createBot() {
            const pos = getSafePosition();
            const behaviors = ['wander', 'chase', 'aggressive', 'coward'];
            const initialLen = GAME_CONFIG.SNAKE_INITIAL_LENGTH + Math.random() * 20;

            const availableNames = botNames.filter(name => name !== player.name);
            const botName = availableNames[Math.floor(Math.random() * availableNames.length)] || "Bot_" + Math.floor(Math.random() * 1000);

            const bot = {
                id: 'bot-' + Math.random().toString(36).substr(2, 9),
                x: pos.x, y: pos.y, angle: Math.random() * Math.PI * 2,
                targetAngle: Math.random() * Math.PI * 2,
                speed: GAME_CONFIG.SNAKE_BASE_SPEED, 
                normalSpeed: GAME_CONFIG.SNAKE_BASE_SPEED - 0.7 + Math.random(),
                radius: GAME_CONFIG.SNAKE_INITIAL_RADIUS,
                length: initialLen,
                history: [], historySpacing: GAME_CONFIG.SNAKE_HISTORY_SPACING,
                score: Math.floor(Math.random() * 500) + 100,
                name: botName,
                skin: skins[Math.floor(Math.random() * skins.length)],
                behavior: behaviors[Math.floor(Math.random() * behaviors.length)],
                aiTimer: 0, isBoosting: false, boostCounter: 0,
                isTop1: false, distAccum: 0
            };

            for (let i = 0; i <= initialLen * GAME_CONFIG.SNAKE_HISTORY_SPACING; i++) {
                bot.history.push({ x: pos.x, y: pos.y });
            }
            return bot;
        }

        function spawnFood(isDeath = false, srcX, srcY) {
            if (isDeath) {
                return {
                    x: srcX, y: srcY, radius: GAME_CONFIG.DEATH_FOOD_RADIUS,
                    color: neonColors[Math.floor(Math.random() * neonColors.length)],
                    phase: Math.random() * Math.PI * 2, floatOffset: 0, isDeathFood: true
                };
            }
            const angle = Math.random() * Math.PI * 2;
            const r = Math.sqrt(Math.random()) * (CENTER - 20);
            return {
                x: CENTER + Math.cos(angle) * r, y: CENTER + Math.sin(angle) * r,
                radius: Math.random() * 1 + 2, color: neonColors[Math.floor(Math.random() * neonColors.length)],
                phase: Math.random() * Math.PI * 2, floatOffset: Math.random() * Math.PI * 2, isDeathFood: false
            };
        }

        const checkPerfectCollision = (headX, headY, headR, headAngle, target) => {
            const tipX = headX + Math.cos(headAngle) * (headR * 0.3);
            const tipY = headY + Math.sin(headAngle) * (headR * 0.3);
            const spacing = GAME_CONFIG.SNAKE_HISTORY_SPACING;
            const maxHistoryIdx = Math.min(Math.floor(target.length) * spacing, target.history.length - 1);

            for (let i = 0; i <= maxHistoryIdx; i += spacing) {
                const s = target.history[i]; if (!s) continue;
                const distSq = (tipX - s.x) ** 2 + (tipY - s.y) ** 2;
                const threshold = (target.radius || GAME_CONFIG.SNAKE_INITIAL_RADIUS) * GAME_CONFIG.SNAKE_HITBOX_SIZE;
                if (distSq < threshold ** 2) return true;
            }
            return false;
        };

        const dropDeathFood = (snake) => {
            const step = GAME_CONFIG.DEATH_FOOD_STEP;
            const maxIdx = Math.min(Math.floor(snake.length) * snake.historySpacing, snake.history.length - 1);
            for (let i = 0; i <= maxIdx; i += step) {
                const pos = snake.history[i];
                if (pos) foods.push(spawnFood(true, pos.x, pos.y));
            }
        };

        let mouseX = 0, mouseY = 0, isMouseDown = false;
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        window.addEventListener('resize', resize);
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (!isTouch && gameState !== 'PLAYING') { mouseX = canvas.width / 2; mouseY = canvas.height / 2; }
        }
        resize();

        if (isTouch) {
            document.getElementById('mobile-controls').style.display = 'block';
            applySettingsUI();
        }

        window.addEventListener('mousemove', (e) => { if (!isTouch) { mouseX = e.clientX; mouseY = e.clientY; } });
        window.addEventListener('mousedown', () => { if (!isTouch) isMouseDown = true; });
        window.addEventListener('mouseup', () => { if (!isTouch) isMouseDown = false; });

        const joystickBase = document.getElementById('joystick-base');
        const joystickStick = document.getElementById('joystick-stick');
        let joystickTouchId = null, joyX = 0, joyY = 0;

        window.addEventListener('touchstart', (e) => {
            if (!isTouch || e.target.closest('#start-screen') || e.target.closest('#settings-modal') || e.target.id === 'boost-btn') return;

            if (controlOpt === 'touch') {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
                return;
            }

            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && joystickTouchId === null) {
                    joystickTouchId = t.identifier;
                    joyX = t.clientX; joyY = t.clientY;
                    const bRect = joystickBase.getBoundingClientRect();
                    joystickBase.style.left = `${joyX - bRect.width / 2}px`;
                    joystickBase.style.top = `${joyY - bRect.height / 2}px`;
                    joystickBase.style.bottom = 'auto';
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!isTouch || e.target.closest('#start-screen') || e.target.closest('#settings-modal')) return;

            if (controlOpt === 'touch') {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
                return;
            }

            if (joystickTouchId === null) return;
            for (let t of e.changedTouches) {
                if (t.identifier === joystickTouchId) {
                    let dx = t.clientX - joyX, dy = t.clientY - joyY;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let max = joystickBase.offsetWidth / 2;
                    if (dist > max) { dx *= max / dist; dy *= max / dist; }
                    joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    let angle = Math.atan2(dy, dx);
                    mouseX = canvas.width / 2 + Math.cos(angle) * 200;
                    mouseY = canvas.height / 2 + Math.sin(angle) * 200;
                }
            }
        });

        window.addEventListener('touchend', (e) => {
            if (controlOpt === 'touch') return;
            for (let t of e.changedTouches) {
                if (t.identifier === joystickTouchId) {
                    joystickTouchId = null;
                    joystickStick.style.transform = `translate(-50%, -50%)`;
                    joystickBase.style.left = '';
                    joystickBase.style.top = '';
                    joystickBase.style.bottom = '';
                }
            }
        });

        const bBtn = document.getElementById('boost-btn');
        bBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isMouseDown = true; });
        bBtn.addEventListener('touchend', (e) => { e.preventDefault(); isMouseDown = false; });

        let lastLoopTime = performance.now();

        function update() {
            if (gameState !== 'PLAYING') return;

            // --- Cálculo de Delta-Time (dt) para Física independente de FPS ---
            const nowTime = performance.now();
            const dt = (nowTime - lastLoopTime) / 16.667; // Normalizado para 60FPS (16.6ms)
            lastLoopTime = nowTime;

            // Arrays Efeitos Visuais
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y += ft.vy; ft.life -= 0.02;
                if (ft.life <= 0) floatingTexts.splice(i, 1);
            }
            for (let i = sparks.length - 1; i >= 0; i--) {
                let s = sparks[i];
                s.x += s.vx; s.y += s.vy; s.life -= 0.05;
                if (s.life <= 0) sparks.splice(i, 1);
            }

            // --- FÍSICA DO JOGADOR ---
            const isBoosting = isMouseDown && player.length > GAME_CONFIG.BOOST_MIN_LENGTH;
            const zoomNerf = isBoosting ? 0.15 : 0;

            const targetZoom = Math.max(GAME_CONFIG.CAMERA_MIN_ZOOM, GAME_CONFIG.CAMERA_BASE_ZOOM - (player.length - GAME_CONFIG.SNAKE_INITIAL_LENGTH) * GAME_CONFIG.ZOOM_SHRINK_RATE - zoomNerf);
            camera.zoom += (targetZoom - camera.zoom) * 0.05;

            const baseRadius = Math.min(GAME_CONFIG.SNAKE_MAX_RADIUS, GAME_CONFIG.SNAKE_INITIAL_RADIUS + (player.length - GAME_CONFIG.SNAKE_INITIAL_LENGTH) * GAME_CONFIG.WIDTH_GROWTH_FACTOR);

            const tx = (mouseX - canvas.width / 2) / camera.zoom + camera.x;
            const ty = (mouseY - canvas.height / 2) / camera.zoom + camera.y;
            const targetAngle = Math.atan2(ty - player.y, tx - player.x);
            let diff = targetAngle - player.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;

            const growthDampening = Math.max(0.55, 1 - (player.length - 20) * 0.001);
            player.angle += diff * (isBoosting ? GAME_CONFIG.SNAKE_TURN_SPEED_BOOST : GAME_CONFIG.SNAKE_TURN_SPEED) * growthDampening * dt;

            const speedBase = GAME_CONFIG.SNAKE_BASE_SPEED;

            if (isBoosting) {
                player.speed = speedBase * GAME_CONFIG.BOOST_SPEED_MULT;
                player.radius = baseRadius;

                const tail = player.history[Math.floor(player.length * player.historySpacing)];
                if (tail && Math.random() < 0.4) spawnSpark(tail.x, tail.y, player.angle);

                player.boostCounter += dt;
                if (player.boostCounter > GAME_CONFIG.BOOST_FRAMES_PER_DROP) {
                    player.boostCounter = 0;
                    player.length -= GAME_CONFIG.BOOST_LENGTH_LOSS;
                    player.score = Math.max(0, player.score - GAME_CONFIG.BOOST_SCORE_LOSS);
                    if (tail) foods.push(spawnFood(true, tail.x, tail.y));
                }
            } else {
                player.speed = speedBase;
                player.radius = baseRadius;
                player.boostCounter = 0;
            }

            player.x += Math.cos(player.angle) * player.speed * dt;
            player.y += Math.sin(player.angle) * player.speed * dt;

            if (Math.sqrt((player.x - CENTER) ** 2 + (player.y - CENTER) ** 2) > CENTER - player.radius * 0.2) {
                dropDeathFood(player); gameOver(); return;
            }

            for (let bot of bots) {
                if (checkPerfectCollision(player.x, player.y, player.radius, player.angle, bot)) {
                    dropDeathFood(player); playerDie(); return;
                }
            }

            for (let id in otherPlayers) {
                if (checkPerfectCollision(player.x, player.y, player.radius, player.angle, otherPlayers[id])) {
                    dropDeathFood(player); playerDie(); return;
                }
            }

            const pVx = Math.cos(player.angle);
            const pVy = Math.sin(player.angle);
            player.distAccum = (player.distAccum || 0) + player.speed * dt;
            while (player.distAccum >= GAME_CONFIG.SNAKE_HISTORY_STEP) {
                player.distAccum -= GAME_CONFIG.SNAKE_HISTORY_STEP;
                player.history.unshift({
                    x: player.x - pVx * player.distAccum,
                    y: player.y - pVy * player.distAccum
                });
            }
            player.history.length = Math.min(player.history.length, Math.floor(player.length * player.historySpacing) + 1);

            // Câmera Inteligente (Look-ahead)
            let lookDist = isBoosting ? 130 : player.speed * GAME_CONFIG.CAMERA_LOOK_AHEAD;
            let camTargetX = player.x + Math.cos(player.angle) * lookDist;
            let camTargetY = player.y + Math.sin(player.angle) * lookDist;
            camera.x += (camTargetX - camera.x) * 0.05;
            camera.y += (camTargetY - camera.y) * 0.05;

            // Consumo de Comida (Jogador)
            const magnet = player.radius * GAME_CONFIG.MAGNET_RADIUS_MULT;
            for (let i = foods.length - 1; i >= 0; i--) {
                const f = foods[i], d = Math.sqrt((player.x - f.x) ** 2 + (player.y - f.y) ** 2);
                if (d < player.radius + f.radius) {
                    foods.splice(i, 1);

                    // Burst de partículas explosivas
                    spawnParticles(f.x, f.y, f.color, f.isDeathFood ? 15 : 8);

                    // Texto flutuante colado
                    let pts = f.isDeathFood ? GAME_CONFIG.DEATH_SCORE : GAME_CONFIG.SCORE_PER_FOOD;
                    spawnFloatingText(f.x, f.y, `+${pts}`, f.color);

                    // Tremor removido por pedido do utilizador
                    // if (f.isDeathFood) camera.shake = 8;

                    player.length += f.isDeathFood ? GAME_CONFIG.DEATH_GROWTH : GAME_CONFIG.GROWTH_PER_FOOD;
                    player.score += pts;
                    if (player.score > highScore) {
                        highScore = player.score;
                        highScoreHomeElement.innerText = Math.floor(highScore);
                        localStorage.setItem('cobraioHighScore', highScore);
                    }
                    updateLeaderboard();

                    // Notify server about food eaten
                    socket.emit('eatFood', f.id);
                } else if (d < magnet) { f.x += (player.x - f.x) * GAME_CONFIG.MAGNET_STRENGTH; f.y += (player.y - f.y) * GAME_CONFIG.MAGNET_STRENGTH; }
            }

            // Sync with other players (collision check for them)
            // Server should ideally handle this, but for now client-side check if someone else ate it is too slow.
            // We rely on 'foodEaten' event above.

            // Send local state to server (Throttled but optimized)
            const now = Date.now();
            if (now - lastUpdateTime > 45) {
                lastUpdateTime = now;
                socket.emit('update', {
                    x: player.x,
                    y: player.y,
                    angle: player.angle,
                    score: player.score,
                    length: player.length,
                    radius: player.radius,
                    // optimization: only send history needed for visible segments/collisions
                    history: player.history.slice(0, 150),
                    isBoosting: isBoosting
                });
            }

            // --- SUAVIZAÇÃO DE OUTROS JOGADORES (MELHORADA) ---
            const spacing = GAME_CONFIG.SNAKE_HISTORY_SPACING;
            for (let id in otherPlayers) {
                let p = otherPlayers[id];
                if (p.targetX !== undefined) {
                    // Fator de suavização mais agressivo para evitar o efeito "tremido"
                    const lerpFactor = 0.25;

                    p.x += (p.targetX - p.x) * lerpFactor;
                    p.y += (p.targetY - p.y) * lerpFactor;

                    let aDiff = p.targetAngle - p.angle;
                    while (aDiff < -Math.PI) aDiff += Math.PI * 2;
                    while (aDiff > Math.PI) aDiff -= Math.PI * 2;
                    p.angle += aDiff * lerpFactor;

                    // Suavizar o corpo: Lerp apenas nos segmentos críticos ou de forma mais rápida
                    if (p.history) {
                        for (let i = 0; i < p.history.length; i++) {
                            const seg = p.history[i];
                            if (seg.tx !== undefined) {
                                seg.x += (seg.tx - seg.x) * lerpFactor;
                                seg.y += (seg.ty - seg.y) * lerpFactor;
                            }
                        }
                    }
                }
            }

            liveScoreVal.innerText = Math.floor(player.score);

            // Lógica de Bots removida do cliente (agora processada no servidor)
            // while (foods.length < GAME_CONFIG.TOTAL_FOOD) foods.push(spawnFood());
        }

        function updateLeaderboard() {
            const others = Object.values(otherPlayers).map(p => ({ name: p.name, score: p.score || 0, isPlayer: false, ref: p }));
            const list = [...bots.map(b => ({ name: b.name, score: b.score, isPlayer: false, ref: b })),
            ...others,
            { name: player.name, score: player.score, isPlayer: true, ref: player }]
                .sort((a, b) => b.score - a.score);

            const pIdx = list.findIndex(x => x.isPlayer);

            bots.forEach(b => b.isTop1 = false);
            player.isTop1 = false;
            if (list.length > 0) list[0].ref.isTop1 = true;

            const top10 = list.slice(0, 10);

            leaderList.innerHTML = top10.map((p, i) => `
                <div class="leader-item" style="color: ${p.isPlayer ? 'var(--neon-green)' : 'rgba(255,255,255,0.4)'}">
                    <span class="rank-num">#${i + 1}</span>
                    <span class="leader-name">${p.name}</span>
                    <span class="leader-score">${Math.floor(p.score)}</span>
                </div>
            `).join('') + (pIdx >= 10 ? `
                <div style="text-align:center; font-size:10px; opacity:0.3; margin:2px 0;">...</div>
                <div class="leader-item my-rank">
                    <span class="rank-num">#${pIdx + 1}</span>
                    <span class="leader-name">${player.name}</span>
                    <span class="leader-score">${Math.floor(player.score)}</span>
                </div>
            ` : '');
        }

        // --- RENDERIZAÇÃO ---
        function drawSnake(context, entity, activeSkin, isBoosting) {
            const segments = Math.floor(entity.length);
            const isHigh = qualityOpt === 'high';

            // PASS 1: Borda exterior e Brilho (O segredo do efeito Tubo perfeito)
            context.save();
            context.lineCap = 'round';
            context.lineJoin = 'round';

            if (isHigh) {
                if (isBoosting) {
                    const headColor = activeSkin.getBodyColor(false, 0, segments)[0];
                    context.shadowBlur = 15;
                    context.shadowColor = headColor;
                } else {
                    context.shadowBlur = 6;
                    context.shadowColor = 'rgba(0,0,0,0.6)';
                }
            } else {
                context.shadowBlur = 0;
            }

            context.lineWidth = (entity.radius * 2) + 6; // Borda preta sólida
            context.strokeStyle = '#0a0e14';

            context.beginPath();
            let first = true;
            const spacing = GAME_CONFIG.SNAKE_HISTORY_SPACING;
            for (let i = segments - 1; i > 0; i--) {
                const pos = entity.history[i * spacing];
                if (!pos) continue;
                if (first) { context.moveTo(pos.x, pos.y); first = false; }
                else { context.lineTo(pos.x, pos.y); }
            }
            if (!first) context.lineTo(entity.x, entity.y);
            context.stroke();
            context.restore();

            // PASS 2: Gomos Sólidos (Listras) - Agora vai até ao índice 0 (cabeça integrada no tubo)
            for (let i = segments - 1; i >= 0; i--) {
                const pos = i === 0 ? { x: entity.x, y: entity.y } : entity.history[i * spacing];
                if (!pos) continue;

                // Divisão por 4 cria listras mais grossas e realistas, iguais à imagem
                let isDark = Math.floor(i / 4) % 2 === 0;

                const baseColors = activeSkin.getBodyColor(isDark, i, segments);
                let c = activeSkin.getTailColor && activeSkin.getTailColor(segments - i) ? activeSkin.getTailColor(segments - i) : { c1: baseColors[0], c2: baseColors[1] };

                context.fillStyle = c.c1; // Cor totalmente lisa, sem efeitos esféricos
                context.beginPath();
                context.arc(pos.x, pos.y, entity.radius, 0, Math.PI * 2);
                context.fill();
            }

            // PASS 3: Brilho de Cilíndro 3D - Passa por cima da cabeça, selando o efeito
            if (isHigh) {
                context.save();
                context.lineCap = 'round';
                context.lineJoin = 'round';
                context.lineWidth = entity.radius * 0.8;
                context.strokeStyle = 'rgba(255, 255, 255, 0.15)';

                context.beginPath();
                first = true;
                for (let i = segments - 1; i > 0; i--) {
                    const pos = entity.history[i * spacing];
                    if (!pos) continue;
                    if (first) { context.moveTo(pos.x, pos.y); first = false; }
                    else { context.lineTo(pos.x, pos.y); }
                }
                if (!first) context.lineTo(entity.x, entity.y);
                context.stroke();
                context.restore();
            }

            // PASS 4: Apenas os Olhos (A cabeça fundiu-se com o corpo)
            [entity.angle - 0.7, entity.angle + 0.7].forEach(a => {
                const ex = entity.x + Math.cos(a) * entity.radius * 0.6, ey = entity.y + Math.sin(a) * entity.radius * 0.6;
                const eR = entity.radius * 0.42;
                context.fillStyle = '#fff'; context.beginPath(); context.arc(ex, ey, eR, 0, Math.PI * 2); context.fill();
                const pR = eR * 0.55;
                const px = ex + Math.cos(entity.angle) * pR * 0.4, py = ey + Math.sin(entity.angle) * pR * 0.4;
                context.fillStyle = '#000'; context.beginPath(); context.arc(px, py, pR, 0, Math.PI * 2); context.fill();
                if (isHigh) {
                    context.fillStyle = '#fff'; context.beginPath(); context.arc(px - pR * 0.3, py - pR * 0.3, pR * 0.3, 0, Math.PI * 2); context.fill();
                }
            });

            // Coroa
            if (entity.isTop1) {
                context.save();
                context.translate(entity.x, entity.y);
                context.rotate(entity.angle);

                context.fillStyle = '#ffdd00';
                context.shadowBlur = isHigh ? 15 : 0;
                context.shadowColor = '#ffaa00';
                context.strokeStyle = '#ffffff';
                context.lineWidth = 1.5;

                context.beginPath();
                let cr = entity.radius;
                context.moveTo(-cr * 0.1, -cr * 0.5);
                context.lineTo(-cr * 0.8, -cr * 0.6);
                context.lineTo(-cr * 0.5, -cr * 0.15);
                context.lineTo(-cr * 1.0, 0);
                context.lineTo(-cr * 0.5, cr * 0.15);
                context.lineTo(-cr * 0.8, cr * 0.6);
                context.lineTo(-cr * 0.1, cr * 0.5);
                context.quadraticCurveTo(cr * 0.2, 0, -cr * 0.1, -cr * 0.5);

                context.fill(); context.stroke();

                context.shadowBlur = isHigh ? 5 : 0;
                context.fillStyle = '#ff00aa'; context.beginPath(); context.arc(-cr * 0.75, -cr * 0.5, cr * 0.1, 0, Math.PI * 2); context.fill();
                context.fillStyle = '#00ddff'; context.beginPath(); context.arc(-cr * 0.9, 0, cr * 0.1, 0, Math.PI * 2); context.fill();
                context.fillStyle = '#ff00aa'; context.beginPath(); context.arc(-cr * 0.75, cr * 0.5, cr * 0.1, 0, Math.PI * 2); context.fill();
                context.restore();
            }
        }

        function draw() {
            ctx.fillStyle = '#0b0e14'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Decaimento suave do tremer de ecrã (Camera Shake)
            camera.shake *= 0.85;
            if (camera.shake < 0.5) camera.shake = 0;

            ctx.save();
            let sx = camera.shake > 0 ? (Math.random() - 0.5) * camera.shake : 0;
            let sy = camera.shake > 0 ? (Math.random() - 0.5) * camera.shake : 0;

            ctx.translate(canvas.width / 2 + sx, canvas.height / 2 + sy);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            const isHigh = qualityOpt === 'high';

            // Hexágonos
            const r = 45, w = Math.sqrt(3) * r, h = 2 * r, offY = h * 0.75;
            const vW = canvas.width / camera.zoom, vH = canvas.height / camera.zoom;
            for (let row = Math.floor((camera.y - vH / 2) / offY) - 1; row <= Math.floor((camera.y + vH / 2) / offY) + 1; row++) {
                for (let col = Math.floor((camera.x - vW / 2) / w) - 1; col <= Math.floor((camera.x + vW / 2) / w) + 1; col++) {
                    let px = col * w + (row % 2 === 0 ? 0 : w / 2), py = row * offY;
                    ctx.strokeStyle = '#0d1116'; ctx.fillStyle = '#181d24'; ctx.lineWidth = 4;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        let a = Math.PI / 180 * (60 * i - 30);
                        let x = px + r * 0.95 * Math.cos(a), y = py + r * 0.95 * Math.sin(a);
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                }
            }

            // Borda Pulsante Dinâmica Intensa
            ctx.beginPath(); ctx.arc(CENTER, CENTER, CENTER, 0, Math.PI * 2);
            let distToCenter = Math.hypot(player.x - CENTER, player.y - CENTER);
            let danger = Math.max(0, (distToCenter - (CENTER - 1000)) / 1000);
            let pulse = (Math.sin(Date.now() / 150) + 1) / 2;

            ctx.strokeStyle = `rgba(255, 50, 50, ${0.2 + (danger * pulse * 0.4)})`;
            ctx.lineWidth = 20 + (danger * pulse * 20); // Linha cresce com o perigo
            ctx.stroke();
            if (isHigh) {
                ctx.globalCompositeOperation = 'lighter';
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 4 + (danger * pulse * 4);
                ctx.shadowBlur = 20 + (danger * pulse * 60); // Brilho intensifica com o perigo
                ctx.shadowColor = '#ff0000'; ctx.stroke();
                ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
            }

            // Comidas
            const tTime = Date.now() / 1000;
            foods.forEach(f => {
                if (f.x < camera.x - vW / 2 - 30 || f.x > camera.x + vW / 2 + 30 || f.y < camera.y - vH / 2 - 30 || f.y > camera.y + vH / 2 + 30) return;

                // Defensive checks to prevent NaN
                const phase = f.phase || 0;
                const rAnim = f.isDeathFood ? f.radius : f.radius + Math.sin(Date.now() / 150 + phase) * 0.8;

                const floatX = f.isDeathFood ? 0 : Math.sin(tTime * 1.5 + phase) * 4;
                const floatY = f.isDeathFood ? 0 : Math.cos(tTime * 2.0 + phase) * 4;
                const dX = f.x + floatX;
                const dY = f.y + floatY;

                if (isHigh) {
                    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.arc(dX + 2, dY + 3, rAnim, 0, Math.PI * 2); ctx.fill();
                    ctx.globalCompositeOperation = 'lighter';
                    const glowMult = f.isDeathFood ? GAME_CONFIG.FOOD_GLOW_MULT_DEATH : GAME_CONFIG.FOOD_GLOW_MULT_NORMAL;
                    const g = ctx.createRadialGradient(dX, dY, rAnim, dX, dY, rAnim * glowMult);
                    g.addColorStop(0, f.color + '99'); g.addColorStop(1, f.color + '00');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(dX, dY, rAnim * glowMult, 0, Math.PI * 2); ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';
                    const s = ctx.createRadialGradient(dX - rAnim * 0.3, dY - rAnim * 0.3, rAnim * 0.1, dX, dY, rAnim);
                    s.addColorStop(0, '#fff'); s.addColorStop(0.5, f.color); s.addColorStop(1, f.color);
                    ctx.fillStyle = s; ctx.beginPath(); ctx.arc(dX, dY, rAnim, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(dX, dY, rAnim, 0, Math.PI * 2); ctx.fill();
                }
            });

            // Faíscas do Boost
            ctx.globalCompositeOperation = 'lighter';
            sparks.forEach(s => {
                ctx.fillStyle = `rgba(255,255,255,${s.life})`;
                ctx.shadowColor = s.color;
                ctx.shadowBlur = 5;
                ctx.beginPath(); ctx.arc(s.x, s.y, 2 * s.life, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;

            // Bots, Outros Jogadores e Jogador Local
            bots.forEach(bot => {
                // Suavização simples para bots sincronizados
                const lf = 0.2;
                if (bot.targetX !== undefined) {
                    bot.x += (bot.targetX - bot.x) * lf;
                    bot.y += (bot.targetY - bot.y) * lf;
                    let aD = bot.targetAngle - bot.angle;
                    while(aD < -Math.PI) aD += Math.PI * 2; while(aD > Math.PI) aD -= Math.PI * 2;
                    bot.angle += aD * lf;
                    if (bot.history) {
                        bot.history.forEach(seg => {
                            if (seg.tx !== undefined) {
                                seg.x += (seg.tx - seg.x) * lf;
                                seg.y += (seg.ty - seg.y) * lf;
                            }
                        });
                    }
                }
                drawSnake(ctx, bot, skins[bot.skinIndex || 0], bot.isBoosting);
            });
            Object.values(otherPlayers).forEach(p => {
                drawSnake(ctx, p, skins[p.skinIndex || 0], p.isBoosting);
            });
            drawSnake(ctx, player, skins[currentSkinIndex], isMouseDown && player.length > GAME_CONFIG.BOOST_MIN_LENGTH);

            // Nomes e UI In-World
            ctx.font = 'bold 16px Outfit, sans-serif'; ctx.textAlign = 'center';
            if (isHigh) { ctx.shadowBlur = 5; ctx.shadowColor = 'black'; }

            bots.forEach(bot => {
                if (bot.x > camera.x - vW / 2 && bot.x < camera.x + vW / 2 && bot.y > camera.y - vH / 2 && bot.y < camera.y + vH / 2) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillText(bot.name, bot.x, bot.y - bot.radius - 15);
                }
            });
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fillText(player.name, player.x, player.y - player.radius - 15);
            ctx.shadowBlur = 0;

            // Partículas da comida (Burst Colorido)
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Textos Flutuantes (+10 / +30)
            ctx.font = '900 14px Outfit, sans-serif';
            floatingTexts.forEach(ft => {
                ctx.fillStyle = ft.color;
                ctx.globalAlpha = Math.max(0, ft.life);
                ctx.fillText(ft.text, ft.x, ft.y);
            });
            ctx.globalAlpha = 1.0;

            ctx.restore();

            // Minimapa
            if (gameState === 'PLAYING') {
                const mmR = isTouch ? 40 : 50, mmM = 20, mmX = mmM + mmR, mmY = mmM + mmR;
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(mmX, mmY, mmR, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = 'rgba(86,171,47,0.3)'; ctx.lineWidth = 2; ctx.stroke();

                bots.forEach(b => {
                    const dXb = mmX + (b.x - CENTER) / CENTER * (mmR - 3);
                    const dYb = mmY + (b.y - CENTER) / CENTER * (mmR - 3);
                    ctx.beginPath(); ctx.arc(dXb, dYb, 2, 0, Math.PI * 2); ctx.fill();
                });

                Object.values(otherPlayers).forEach(p => {
                    const dXp = mmX + (p.x - CENTER) / CENTER * (mmR - 3);
                    const dYp = mmY + (p.y - CENTER) / CENTER * (mmR - 3);
                    ctx.fillStyle = '#ff00aa';
                    ctx.beginPath(); ctx.arc(dXp, dYp, 2, 0, Math.PI * 2); ctx.fill();
                });

                const dX = mmX + (player.x - CENTER) / CENTER * (mmR - 3), dY = mmY + (player.y - CENTER) / CENTER * (mmR - 3);
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 8; ctx.shadowColor = '#fff';
                ctx.beginPath(); ctx.arc(dX, dY, 3, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        function gameOver() {
            gameState = 'GAME_OVER';
            camera.shake = 30; // Tremor forte ao morrer

            document.getElementById('final-score-val').innerText = Math.floor(player.score);
            document.getElementById('game-over-msg').style.display = 'block';
            startScreen.style.opacity = '1'; startScreen.style.display = 'flex';
            leaderboardContainer.style.display = 'none';
            liveHud.style.display = 'none';
            document.getElementById('mobile-controls').style.display = 'none';
            highScoreHomeElement.innerText = Math.floor(highScore);

            mouseX = canvas.width / 2; mouseY = canvas.height / 2;
        }

        function playerDie() {
            socket.emit('die');
            gameOver();
        }

        // Preview
        const pCanvas_ = document.getElementById('preview-canvas');
        pCanvas_.width = 200; pCanvas_.height = 100; // Garantir dimensões internas
        const pCtx_ = pCanvas_.getContext('2d');
        const pSnake = { x: -60, y: 50, angle: 0, radius: 15, length: 25, history: [], historySpacing: GAME_CONFIG.SNAKE_HISTORY_SPACING, isTop1: false };

        for (let i = 0; i <= 25 * GAME_CONFIG.SNAKE_HISTORY_SPACING; i++) {
            pSnake.history.push({ x: -60, y: 50 });
        }

        function drawPreview() {
            if (gameState === 'PLAYING') return;
            pCtx_.clearRect(0, 0, pCanvas_.width, pCanvas_.height);

            const w = pCanvas_.width, h = pCanvas_.height;
            const time = Date.now() * 0.004;
            const speed = 1.5;
            const oldX = pSnake.x;
            const oldY = pSnake.y;

            pSnake.x += speed;
            pSnake.y = (h / 2) + Math.sin(time) * 12;
            pSnake.angle = Math.atan2(pSnake.y - oldY, pSnake.x - oldX);

            if (pSnake.x > w + 60) {
                pSnake.x = -60;
                pSnake.history = [];
                for (let i = 0; i <= 25 * GAME_CONFIG.SNAKE_HISTORY_SPACING; i++) {
                    pSnake.history.push({ x: -60, y: pSnake.y });
                }
            }

            pSnake.history.unshift({ x: pSnake.x, y: pSnake.y });
            pSnake.history.length = Math.floor(pSnake.length * pSnake.historySpacing) + 1;
            drawSnake(pCtx_, pSnake, skins[currentSkinIndex], false);
        }

        document.getElementById('prev-skin').onclick = () => { currentSkinIndex = (currentSkinIndex - 1 + skins.length) % skins.length; updateSkinDisplay(); };
        document.getElementById('next-skin').onclick = () => { currentSkinIndex = (currentSkinIndex + 1) % skins.length; updateSkinDisplay(); };
        function updateSkinDisplay() { document.getElementById('skin-name').innerText = skins[currentSkinIndex].name; }
        updateSkinDisplay();

        document.getElementById('start-btn').onclick = () => {
            // Fullscreen no mobile (pedido do utilizador)
            if (isTouch) {
                const docEl = document.documentElement;
                if (docEl.requestFullscreen) docEl.requestFullscreen().catch(() => {});
                else if (docEl.mozRequestFullScreen) docEl.mozRequestFullScreen().catch(() => {});
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen().catch(() => {});
                else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen().catch(() => {});
            }

            player.name = document.getElementById('player-name').value.trim() || 'Convidado';
            localStorage.setItem('cobraioNick', player.name);
            
            const pos = getSafePosition(true); // Encontrar lugar longe de bots e outros players
            player.x = pos.x; 
            player.y = pos.y;
            
            player.length = GAME_CONFIG.SNAKE_INITIAL_LENGTH;
            player.score = 0; player.distAccum = 0;
            player.history = [];
 
            for (let i = 0; i <= GAME_CONFIG.SNAKE_INITIAL_LENGTH * GAME_CONFIG.SNAKE_HISTORY_SPACING; i++) {
                player.history.push({ x: player.x, y: player.y });
            }
 
            camera.x = player.x; camera.y = player.y; camera.shake = 0;

            foods.length = 0; particles.length = 0; floatingTexts.length = 0; sparks.length = 0;
            // O servidor já enviou a comida inicial no 'init'
 
            // bots.length = 0; // Geridos pelo servidor agora
            spawnTimer = GAME_CONFIG.SPAWN_DELAY;
            // for (let i = 0; i < GAME_CONFIG.NUM_BOTS; i++) bots.push(createBot());
 
            mouseX = canvas.width / 2; mouseY = canvas.height / 2;
            isMouseDown = false;
 
            gameState = 'PLAYING';
 
            // Join server
            socket.emit('join', {
                name: player.name,
                skinIndex: currentSkinIndex
            });
 
            startScreen.style.display = 'none';
            leaderboardContainer.style.display = 'block';
            liveHud.style.display = 'block';
            if (isTouch) document.getElementById('mobile-controls').style.display = 'block';
            updateLeaderboard();
        };

        const nickGuardado = localStorage.getItem('cobraioNick');
        if (nickGuardado) document.getElementById('player-name').value = nickGuardado;

        function loop() { 
            update(); 
            draw(); 
            drawPreview(); 
            requestAnimationFrame(loop); 
        }
        
        // Iniciar loop e resetar timer do DT
        lastLoopTime = performance.now();
        loop();
    </script>
</body>

</html>
